<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprog Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .flip-card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .is-flipped {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 font-sans text-slate-800">

    <div id="app" class="w-full max-w-md">
        <!-- Header & Language Selection -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-indigo-600 mb-4">Lær Nye Ord</h1>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label for="langSelect" class="block text-sm font-medium text-slate-500 mb-2">Vælg målsprog:</label>
                <select id="langSelect" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <!-- Sprogmuligheder genereres via JS -->
                </select>
            </div>
        </header>

        <!-- Main Game Area -->
        <main id="game-container">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Flashcard</span>
                <span id="status-bar" class="text-sm font-bold bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">
                    Kort tilbage: 0
                </span>
            </div>

            <!-- Card Container -->
            <div class="relative w-full aspect-[4/3] perspective-1000 cursor-pointer" id="flashcard-trigger">
                <div id="flashcard-inner" class="relative w-full h-full preserve-3d flip-card-inner shadow-xl rounded-2xl">
                    
                    <!-- Front (Dansk) -->
                    <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-2xl border-2 border-slate-100 flex items-center justify-center p-8 text-center">
                        <h2 id="word-danish" class="text-3xl font-bold text-slate-800 leading-tight"></h2>
                        <p class="absolute bottom-4 text-xs text-slate-400 uppercase tracking-widest">Klik for at se svar</p>
                    </div>

                    <!-- Back (Target Language) -->
                    <div class="absolute inset-0 w-full h-full backface-hidden bg-indigo-600 rounded-2xl flex items-center justify-center p-8 text-center rotate-y-180">
                        <h2 id="word-target" class="text-3xl font-bold text-white leading-tight"></h2>
                    </div>

                </div>
            </div>

            <!-- Controls (Visible only when flipped) -->
            <div id="controls" class="mt-8 flex gap-4 opacity-0 pointer-events-none transition-opacity duration-300">
                <button id="btn-wrong" class="flex-1 bg-rose-100 hover:bg-rose-200 text-rose-700 font-bold py-4 rounded-xl transition-colors border-b-4 border-rose-300 active:border-b-0 active:translate-y-1">
                    Forkert
                </button>
                <button id="btn-correct" class="flex-1 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-bold py-4 rounded-xl transition-colors border-b-4 border-emerald-300 active:border-b-0 active:translate-y-1">
                    Rigtigt
                </button>
            </div>
        </main>

        <!-- Completion Screen -->
        <div id="finish-screen" class="hidden text-center py-12 bg-white rounded-3xl shadow-xl border border-slate-100">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">Godt gået!</h2>
            <p class="text-slate-500 mb-8 px-6">Du har gennemført alle ordene i denne runde.</p>
            <button id="btn-restart" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg shadow-indigo-200 transition-all transform hover:scale-105 active:scale-95">
                Start forfra
            </button>
        </div>
    </div>

            { id: "fr", name: "Fransk" },
            { id: "tw", name: "Twi" },
            { id: "bs", name: "Bosnisk" },
            { id: "so", name: "Somali" },
            { id: "ti", name: "Tigrinya" },
            { id: "pl", name: "Polsk" },
            { id: "zh", name: "Mandarin Kinesisk" },
            { id: "pt", name: "Portugisisk" },
            { id: "ar", name: "Arabisk" },
            { id: "th", name: "Thai" },
            { id: "tl", name: "Tagalog" }
        ];

        // State
        let currentDeck = [];
        let isFlipped = false;
        let isTransitioning = false;
        let selectedLang = "en";

        // DOM Elements
        const langSelect = document.getElementById('langSelect');
        const cardInner = document.getElementById('flashcard-inner');
        const wordDanish = document.getElementById('word-danish');
        const wordTarget = document.getElementById('word-target');
        const statusBar = document.getElementById('status-bar');
        const controls = document.getElementById('controls');
        const gameContainer = document.getElementById('game-container');
        const finishScreen = document.getElementById('finish-screen');
        const cardTrigger = document.getElementById('flashcard-trigger');
        const btnWrong = document.getElementById('btn-wrong');
        const btnCorrect = document.getElementById('btn-correct');
        const btnRestart = document.getElementById('btn-restart');

        // Initiering
        function init() {
            languages.forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang.id;
                opt.textContent = lang.name;
                langSelect.appendChild(opt);
            });

            startNewGame();
        }

        function startNewGame() {
            currentDeck = [...dictionary];
            shuffle(currentDeck);
            isFlipped = false;
            isTransitioning = false;
            
            finishScreen.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            
            updateCardUI();
            resetCardState();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateCardUI() {
            if (currentDeck.length === 0) {
                showFinishScreen();
                return;
            }
            const currentWord = currentDeck[0];
            wordDanish.textContent = currentWord.dk;
            wordTarget.textContent = currentWord[selectedLang];
            statusBar.textContent = `Kort tilbage: ${currentDeck.length}`;
        }

        function resetCardState() {
            isFlipped = false;
            cardInner.classList.remove('is-flipped');
            controls.classList.add('opacity-0', 'pointer-events-none');
        }

        function showFinishScreen() {
            gameContainer.classList.add('hidden');
            finishScreen.classList.remove('hidden');
        }

        cardTrigger.addEventListener('click', () => {
            if (isTransitioning || isFlipped) return;
            
            isFlipped = true;
            cardInner.classList.add('is-flipped');
            controls.classList.remove('opacity-0', 'pointer-events-none');
        });

        function handleAnswer(correct) {
            if (isTransitioning) return;
            isTransitioning = true;

            cardInner.classList.remove('is-flipped');
            controls.classList.add('opacity-0', 'pointer-events-none');

            const answeredWord = currentDeck.shift();
            if (!correct) {
                currentDeck.push(answeredWord);
            }

            setTimeout(() => {
                if (currentDeck.length > 0) {
                    updateCardUI();
                    isFlipped = false;
                    isTransitioning = false;
                } else {
                    showFinishScreen();
                    isTransitioning = false;
                }
            }, 400);
        }

        btnCorrect.addEventListener('click', (e) => {
            e.stopPropagation();
            handleAnswer(true);
        });

        btnWrong.addEventListener('click', (e) => {
            e.stopPropagation();
            handleAnswer(false);
        });

        btnRestart.addEventListener('click', startNewGame);

        langSelect.addEventListener('change', (e) => {
            selectedLang = e.target.value;
            if (!isFlipped && !isTransitioning) {
                updateCardUI();
            } else if (isFlipped) {
                wordTarget.textContent = currentDeck[0][selectedLang];
            }
        });

        init();
    </script>
<div class="mt-8 text-center">
    <a href="flashcards.html" class="text-slate-400 hover:text-indigo-600 transition-colors">← Tilbage til menuen</a>
</div>
</body>
</html>
