<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Læsning - Oversigt</title>
    <style>
        /* Grundlæggende layout */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fdfaf6; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center;
            border: 1px solid #f3e5d8;
        }

        h1 { color: #d35400; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 30px; font-size: 0.95rem; }

        /* Knapperne til dine læse-programmer */
        .menu-item { 
            display: block; 
            background: #e67e22; /* Flot orange */
            color: white; 
            padding: 16px; 
            margin: 12px 0; 
            text-decoration: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #cf6a17;
        }

        .menu-item:hover { 
            background: #d35400; 
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #a04000;
        }

        .menu-item:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a04000;
        }

        /* Adskillelse og tilbage-knap */
        hr {
            margin: 30px 0;
            border: 0;
            border-top: 2px dashed #f3e5d8;
        }

        .back-link { 
            display: inline-block; 
            color: #bdc3c7; 
            text-decoration: none; 
            font-weight: 600;
            font-size: 0.9rem;
        }

        .back-link:hover { color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>Læseøvelser</h1>
    <p>Find tekster og opgaver herunder</p>

    <a href="Cloze-test.html" class="menu-item">Cloze-test</a>
    
    <hr>
    
    <a href="du2-modul.html" class="back-link">← Tilbage til Modul 3-4</a>
</div>

</body>
</html>
