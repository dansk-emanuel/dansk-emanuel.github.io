<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Læsning - Lær dansk med Emanuel</title>
    <style>
        /* Grundlæggende styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #fdfaf6; /* En lidt varmere baggrund */
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }

        .container { 
            max-width: 600px; 
            margin: 40px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid #f3e5d8;
        }

        h1 { color: #d35400; margin-bottom: 10px; } /* Orange overskrift */
        p { color: #7f8c8d; margin-bottom: 30px; }

        /* Styling af knapperne (Menu-items) */
        .menu-item { 
            display: block; 
            background: #e67e22; /* Flot orange farve */
            color: white; 
            padding: 18px; 
            margin: 12px 0; 
            text-decoration: none; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #cf6a17; /* Gør den "trykbar" at se på */
        }

        .menu-item:hover { 
            background: #d35400; 
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #a04000;
        }

        .menu-item:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a04000;
        }

        hr {
            margin: 30px 0;
            border: 0;
            border-top: 2px dashed #f3e5d8;
        }

        /* Tilbage-knap styling */
        .back-link { 
            display: inline-block; 
            margin-top: 10px; 
            color: #bdc3c7; 
            text-decoration: none; 
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover { color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>Læseøvelser</h1>

</div>

</body>
</html>
