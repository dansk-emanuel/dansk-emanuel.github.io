<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik Anbefalinger</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fff9f5; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; 
        }

        .container { 
            width: 100%; max-width: 500px; 
            background: white; padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(93, 64, 55, 0.1); 
            border: 1px solid #edbb99; 
            text-align: center; 
        }

        h1 { color: #d35400; margin-bottom: 25px; }

        /* Dropdown Styling */
        .category-item { margin-bottom: 15px; text-align: left; }

        .dropdown-btn {
            width: 100%;
            background: #e67e22;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 0 #d35400;
            transition: all 0.2s ease;
        }

        .dropdown-btn:hover { background: #d35400; }
        
        .dropdown-btn::after {
            content: '▼';
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .dropdown-btn.active::after { transform: rotate(180deg); }
        .dropdown-btn.active { transform: translateY(2px); box-shadow: 0 2px 0 #a04000; }

        /* Dropdown Indhold */
        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #fffaf0;
            border-radius: 0 0 15px 15px;
            border: 1px solid #edbb99;
            border-top: none;
            margin-top: -5px;
        }

        .content-inner { 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
        }

        .music-link {
            color: #5d4037;
            text-decoration: none;
            padding: 10px 0;
            border-bottom: 1px solid #edbb99;
            font-size: 1rem;
            line-height: 1.4;
        }

        .music-link:last-child { border: none; }
        .music-link:hover { color: #e67e22; }

        .back-link { 
            display: block; 
            margin-top: 30px; 
            color: #8d6e63; 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Musik</h1>

        <div class="category-item">
            <button class="dropdown-btn">Pop</button>
            <div class="dropdown-content">
                <div class="content-inner">
                    <a href="https://www.youtube.com/watch?v=h3Uj6pPI08Q&list=RDh3Uj6pPI08Q&start_radio=1" class="music-link">When Saints Go Machine - Hos Mig Igen (feat. Coco O.)</a>
                    <a href="https://www.youtube.com/watch?v=2z0pia1wiLY&list=RD2z0pia1wiLY&start_radio=1" class="Rest in Beats - Fugle Kan Dø"></a>
                </div>
            </div>
        </div>

        <div class="category-item">
            <button class="dropdown-btn">Rock</button>
            <div class="dropdown-content">
                <div class="content-inner">
                    <a href="https://www.youtube.com/watch?v=3LKxxfvhuO0&list=RD3LKxxfvhuO0&start_radio=1" class="music-link" target="_blank">Magtens Korridorer - Snot og Ild</a>
                    <a href="https://www.youtube.com/watch?v=i6JCz-mHBbQ&list=RDi6JCz-mHBbQ&start_radio=1" class="music-link">Love Shop - Alle Har en Drøm at Befri</a>
                </div>
            </div>
        </div>

        <div class="category-item">
            <button class="dropdown-btn">Metal</button>
            <div class="dropdown-content">
                <div class="content-inner">
                    <a href="https://www.youtube.com/watch?v=daStSSJPKUg&list=RDdaStSSJPKUg&start_radio=1" class="music-link">Strychnos - Uendelig Begravelsesmarch</a>
                    <a href="https://www.youtube.com/watch?v=2u1BkDVcvAs&list=RD2u1BkDVcvAs&start_radio=1" class="music-link">CABAL - Blod af Mit</a>
                </div>
            </div>
        </div>

        <a href="anbefalinger.html" class="back-link">← Tilbage til Anbefalinger</a>
    </div>

    <script>
        // Funktion til at åbne/lukke dropdowns
        const dropdowns = document.querySelectorAll(".dropdown-btn");

        dropdowns.forEach(btn => {
            btn.addEventListener("click", function() {
                this.classList.toggle("active");
                const content = this.nextElementSibling;
                
                if (content.style.maxHeight) {
                    content.style.maxHeight = null;
                } else {
                    content.style.maxHeight = content.scrollHeight + "px";
                }
            });
        });
    </script>

</body>
</html>
