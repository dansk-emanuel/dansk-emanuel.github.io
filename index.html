<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velkommen - Dansk Modul 3-4</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fff9f5; 
            margin: 0; padding: 20px; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
        }

        .main-card { 
            width: 100%;
            max-width: 450px; 
            background: white; 
            padding: 40px 20px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(93, 64, 55, 0.1); 
            text-align: center;
            border: 1px solid #edbb99;
        }

        .logo-area { font-size: 3rem; margin-bottom: 10px; }
        h1 { color: #5d4037; font-size: 1.8rem; margin: 5px 0; }
        .welcome-p { color: #8d6e63; margin-bottom: 20px; }

        /* Dagens Ord Boks */
        .word-box { 
            margin: 20px 0; 
            padding: 20px; 
            background-color: #fffaf0; 
            border: 2px solid #edbb99; 
            border-radius: 20px; 
            text-align: left; 
        }
        .word-label { font-size: 0.75rem; text-transform: uppercase; color: #e67e22; font-weight: bold; display: block; margin-bottom: 8px; }
        .word-header { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .the-word { font-size: 1.6rem; color: #5d4037; font-weight: bold; margin: 0; }
        .word-class { font-size: 0.8rem; background: #edbb99; color: #5d4037; padding: 2px 10px; border-radius: 8px; font-weight: bold; }
        
        .phonetic { 
            color: #d35400; 
            font-family: "Times New Roman", Times, serif; 
            font-size: 1.1rem; 
            margin: 5px 0 12px 0; 
            display: block;
        }
        
        .info-content { font-size: 0.95rem; color: #5d4037; line-height: 1.4; margin-bottom: 8px; }
        .example-text { font-style: italic; color: #6d4c41; font-size: 0.9rem; border-left: 2px solid #edbb99; padding-left: 10px; }
        .ordnet-link { display: inline-block; margin-top: 10px; font-size: 0.85rem; color: #e67e22; text-decoration: none; font-weight: bold; }

        /* Knapper */
        .start-btn { 
            display: block; background: #e67e22; color: white; 
            padding: 18px; margin: 12px 0; text-decoration: none; 
            border-radius: 18px; font-size: 1.2rem; font-weight: bold;
            box-shadow: 0 5px 0 #d35400; transition: all 0.2s ease;
        }
        .start-btn.alt { background: #8d6e63; box-shadow: 0 5px 0 #5d4037; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #a04000; }
        .start-btn.alt:hover { box-shadow: 0 7px 0 #3e2723; }
        
        .info-text { 
            margin-top: 25px; font-size: 0.95rem; color: #8d6e63; 
            line-height: 1.5; padding: 0 10px; font-style: italic; 
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-area">🌅</div>
        <h1>Velkommen</h1>
        <p class="welcome-p">Hvad vil du øve i dag?</p>

        <div class="word-box">
            <span class="word-label">Dagens ord</span>
            <div class="word-header">
                <span class="the-word" id="wordTitle">Indlæser...</span>
                <span class="word-class" id="wordClass"></span>
            </div>
            <span class="phonetic" id="wordPhonetic"></span>
            <div class="info-content" id="wordDef"></div>
            <div class="info-content example-text" id="wordExample"></div>
            <a href="#" id="wordLink" target="_blank" class="ordnet-link">Se mere på Ordnet.dk →</a>
        </div>

        <a href="du-2/du2-modul.html" class="start-btn">DU 2 - modul 3-4</a>
        <a href="anbefalinger/anbefalinger.html" class="start-btn alt">Anbefalinger</a>
        
        <div class="info-text">
            Denne side er skabt af mig, Emanuel. Her kan du finde ressourcer til at lære dansk.
        </div>
    </div>

    <script>
        const ugedagensOrd = [
            { 
                word: "Mulighed", 
                class: "substantiv", 
                phonetic: "[ˈmuːliˌheð]", 
                def: "En situation, hvor man kan vælge at gøre noget.", 
                example: "Der er mange muligheder for at få et job i Danmark.", 
                link: "mulighed" 
            },
            { 
                word: "Forbedre", 
                class: "verbum", 
                phonetic: "[fʌˈbeð'ʁʌ]", 
                def: "At gøre noget bedre, end det var før.", 
                example: "Hun vil gerne forbedre sit danske udtale.", 
                link: "forbedre" 
            },
            { 
                word: "Vigtig", 
                class: "adjektiv", 
                phonetic: "[ˈveɡdi]", 
                def: "Noget som har stor betydning eller værdi.", 
                example: "Det er vigtigt at komme til tiden hver dag.", 
                link: "vigtig" 
            },
            { 
                word: "Sædvanligvis", 
                class: "adverbium", 
                phonetic: "[sεðˈvanliˌvis]", 
                def: "Noget der plejer at ske; som regel.", 
                example: "Sædvanligvis spiser vi frokost klokken 12.", 
                link: "sædvanligvis" 
            },
            { 
                word: "Oplevelse", 
                class: "substantiv", 
                phonetic: "[ˈʌbˌlewl̩sə]", 
                def: "Noget man har prøvet, som har gjort indtryk.", 
                example: "Det var en stor oplevelse at rejse til udlandet.", 
                link: "oplevelse" 
            },
            { 
                word: "Deltage", 
                class: "verbum", 
                phonetic: "[ˈdεlˌta'ˌjə]", 
                def: "At være med i en aktivitet sammen med andre.", 
                example: "Han deltager aktivt i undervisningen.", 
                link: "deltage" 
            },
            { 
                word: "Selvstændig", 
                class: "adjektiv", 
                phonetic: "[ˈsεlˌsdεndi]", 
                def: "At kunne klare sig selv uden hjælp fra andre.", 
                example: "Man skal lære at arbejde selvstændigt med opgaverne.", 
                link: "selvstændig" 
            }
        ];

        const d = new Date();
        const current = ugedagensOrd[d.getDay()];

        document.getElementById("wordTitle").innerText = current.word;
        document.getElementById("wordClass").innerText = current.class;
        document.getElementById("wordPhonetic").innerText = current.phonetic;
        document.getElementById("wordDef").innerText = current.def;
        document.getElementById("wordExample").innerText = "\"" + current.example + "\"";
        document.getElementById("wordLink").href = "https://ordnet.dk/ddo/ordbog?query=" + current.link;
    </script>
</body>
</html>
