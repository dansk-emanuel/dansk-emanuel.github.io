<!DOCTYPE html>
<html lang="da">
<head>

        <header>
            <h1>Velkommen til mit Kode-Arkiv</h1>
            <p>Her uploader jeg projekter, jeg laver sammen med min AI-makker.</p>
        </header>

        <section id="projekter">
            <div class="project">
                <h2>Projekt 1: Min Portfolio</h2>
                <p>Dette er den første version af min side.</p>
                <div class="code-box">Status: Online og klar!</div>
            </div>
        </section>
    </div>

</html>
