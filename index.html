<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velkommen</title>
    <style>
        /* DETTE ER CSS-SEKTIONEN */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fff9f5; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .main-card { 
            width: 90%;
            max-width: 450px; 
            background: white; 
            padding: 40px 20px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(93, 64, 55, 0.1); 
            text-align: center;
            border: 1px solid #edbb99;
        }

        h1 { color: #5d4037; font-size: 1.8rem; }
        p { color: #8d6e63; margin-bottom: 30px; }

        .start-btn { 
            display: block; 
            background: #e67e22; 
            color: white; 
            padding: 20px; 
            margin: 10px 0; 
            text-decoration: none; 
            border-radius: 18px; 
            font-size: 1.3rem; 
            font-weight: bold;
            box-shadow: 0 6px 0 #d35400;
            transition: all 0.2s ease;
        }

        /* Den nye stil til din tekst under knappen */
        .info-text {
            margin-top: 25px;
            font-size: 0.95rem;
            color: #8d6e63;
            line-height: 1.5;
            padding: 0 10px;
            font-style: italic;
        }

        .logo-area { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-area">🌅</div>
        <h1>Velkommen</h1>
        <p>Hvad vil du øve i dag?</p>

        <a href="du2-modul.html" class="start-btn">Dansk Modul 3-4</a>
        
        <div class="info-text">
            Denne side er skabt af mig, Emanuel. Jeg lægger løbende ressourcer op, som skal hjælpe kursister på danskuddannelserne med deres dansklæring.
        </div>
    </div>

</body>
</html>
