<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velkommen - Kursistportal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff9f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .main-card { width: 100%; max-width: 480px; background: white; padding: 35px; border-radius: 30px; box-shadow: 0 15px 35px rgba(93, 64, 55, 0.1); text-align: center; border: 1px solid #edbb99; }
        
        h1 { color: #5d4037; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #8d6e63; margin-bottom: 25px; font-size: 0.95rem; }
        
        /* Dagens Ord Boks */
        .word-box { margin: 25px 0; padding: 25px; background-color: #fffaf0; border: 2px solid #edbb99; border-radius: 20px; text-align: left; position: relative; }
        .word-label { font-size: 0.75rem; text-transform: uppercase; color: #e67e22; font-weight: bold; letter-spacing: 1px; display: block; margin-bottom: 10px; }
        
        .word-header { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .the-word { font-size: 1.8rem; color: #5d4037; margin: 0; font-weight: bold; }
        .word-class { font-size: 0.8rem; background: #edbb99; color: #5d4037; padding: 2px 8px; border-radius: 8px; font-weight: bold; vertical-align: middle; }
        
        .phonetic { font-family: 'Segoe UI', sans-serif; color: #8d6e63; font-size: 1rem; margin: 5px 0 15px 0; display: block; }
        
        .info-section { margin-bottom: 12px; }
        .info-label { font-weight: bold; color: #5d4037; font-size: 0.9rem; display: block; margin-bottom: 2px; }
        .info-content { font-size: 0.95rem; color: #5d4037; line-height: 1.4; }
        .example-text { font-style: italic; color: #6d4c41; }

        .ordnet-link { display: inline-block; margin-top: 10px; font-size: 0.85rem; color: #e67e22; text-decoration: none; font-weight: bold; }
        .ordnet-link:hover { text-decoration: underline; }

        .start-btn { display: block; background: #e67e22; color: white; padding: 18px; margin-top: 25px; text-decoration: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 5px 0 #d35400; transition: 0.2s; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #a04000; }
        
        .footer-text { margin-top: 30px; font-size: 0.85rem; color: #8d6e63; font-style: italic; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>Velkommen</h1>
    <p class="subtitle">Danskundervisning Modul 3-4</p>

    <div class="word-box">
        <span class="word-label">Dagens ord 📖</span>
        
        <div class="word-header">
            <span class="the-word" id="wordTitle">Indlæser...</span>
            <span class="word-class" id="wordClass">...</span>
        </div>
        
        <span class="phonetic" id="wordPhonetic"></span>
        
        <div class="info-section">
            <span class="info-label">Betydning:</span>
            <div class="info-content" id="wordDef"></div>
        </div>

        <div class="info-section">
            <span class="info-label">Eksempel:</span>
            <div class="info-content example-text" id="wordExample"></div>
        </div>

        <a href="#" id="wordLink" target="_blank" class="ordnet-link">Læs mere på Ordnet.dk →</a>
    </div>

    <a href="du2-modul.html" class="start-btn">Gå til materialer</a>
    
    <div class="footer-text">
        Brug portalen hver dag for at støtte din læring.
    </div>
</div>

<script>
    // Liste med ord - du kan tilføje/rette dem herunder
    const ugedagensOrd = [
        { 
            word: "Viden", 
            class: "substantiv", 
            phonetic: "[ˈviːðn̩]", 
            def: "Information eller kendskab man har om et emne.", 
            example: "Hun har en stor viden om dansk historie.",
            link: "viden" 
        },
        { 
            word: "Ihærdig", 
            class: "adjektiv", 
            phonetic: "[iˈhaɐ̯di]", 
            def: "At man bliver ved med at gøre en indsats, selvom det er svært.", 
            example: "Han var meget ihærdig i sin søgen efter et job.",
            link: "ihærdig" 
        },
        { 
            word: "Beslutte", 
            class: "verbum", 
            phonetic: "[beˈslodə]", 
            def: "At vælge at gøre noget bestemt efter at have tænkt over det.", 
            example: "De besluttede at flytte til en større lejlighed.",
            link: "beslutte" 
        },
        { 
            word: "Yderligere", 
            class: "adverbium", 
            phonetic: "[ˈyðʌliʌ]", 
            def: "Noget der kommer oveni det, der allerede er.", 
            example: "Vi har brug for yderligere oplysninger i sagen.",
            link: "yderligere" 
        },
        { 
            word: "Udfordring", 
            class: "substantiv", 
            phonetic: "[ˈuðˌfʌdneŋ]", 
            def: "En svær opgave som kræver at man gør sit bedste.", 
            example: "Det er en stor udfordring at lære et nyt sprog.",
            link: "udfordring" 
        },
        { 
            word: "Samarbejde", 
            class: "verbum", 
            phonetic: "[ˈsamɒˌbajdə]", 
            def: "At arbejde sammen med andre om en fælles opgave.", 
            example: "Kursisterne er gode til at samarbejde i grupper.",
            link: "samarbejde" 
        },
        { 
            word: "Ansvarlig", 
            class: "adjektiv", 
            phonetic: "[anˈsvaɐ̯li]", 
            def: "At man har pligt til at sørge for noget eller passe på noget.", 
            example: "Hvem er ansvarlig for at lukke vinduerne?",
            link: "ansvarlig" 
        }
    ];

    const d = new Date();
    const today = d.getDay(); // 0 = søndag, 1 = mandag...
    const current = ugedagensOrd[today];

    document.getElementById("wordTitle").innerText = current.word;
    document.getElementById("wordClass").innerText = current.class;
    document.getElementById("wordPhonetic").innerText = current.phonetic;
    document.getElementById("wordDef").innerText = current.def;
    document.getElementById("wordExample").innerText = "\"" + current.example + "\"";
    document.getElementById("wordLink").href = "https://ordnet.dk/ddo/ordbog?query=" + current.link;
</script>

</body>
</html>
