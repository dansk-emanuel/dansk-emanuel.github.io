<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Bolig - Præsentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 flex flex-col items-center font-sans">

    <header class="w-full max-w-4xl flex justify-between items-center mb-12">
        <div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Min Bolig</h1>
            <p class="text-slate-500 font-medium">Træn din udtale</p>
        </div>
        <button id="backBtn" onclick="goBack()" class="hidden flex items-center gap-2 px-6 py-2 bg-white border border-slate-200 rounded-full shadow-sm hover:bg-slate-100 transition-all text-slate-600 font-semibold">
            <i data-lucide="arrow-left"></i> Tilbage
        </button>
    </header>

    <main class="w-full max-w-4xl flex flex-col items-center justify-center flex-1">
        
        <div id="mainCard" class="fade-in relative z-10 p-8 rounded-[2rem] bg-white shadow-2xl border-b-8 border-blue-500 transition-all flex flex-col items-center text-center max-w-md w-full">
            <div id="iconContainer" class="mb-6 p-6 rounded-3xl bg-blue-50 text-blue-600">
                <i data-lucide="home" class="w-12 h-12"></i>
            </div>
            <h2 id="cardTitle" class="text-3xl font-black text-slate-800 mb-2 uppercase">Min Bolig</h2>
            <p id="cardDescription" class="text-slate-400 mb-8 text-sm font-medium">Tryk på emnerne for at høre korrekt dansk udtale</p>

            <div id="sentenceBox" class="hidden w-full bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-2">
                <p id="sentenceText" class="text-xl font-bold text-slate-700 leading-relaxed mb-8"></p>
                <button onclick="speakText()" id="speakBtn" class="flex items-center justify-center gap-3 w-full py-5 bg-emerald-500 text-white rounded-2xl font-black text-xl transition-all hover:bg-emerald-600 active:scale-95 shadow-xl shadow-emerald-100">
                    <i data-lucide="volume-2"></i> HØR UDTALEN
                </button>
            </div>
        </div>

        <div id="childrenGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-12 w-full">
            </div>

    </main>

    <footer class="mt-auto py-8 text-slate-300 text-[10px] font-bold uppercase tracking-[0.2em] text-center">
        Sprogcenter Værktøj • Mundtlig Præsentation
    </footer>

    <script>
        const mindmapData = {
            root: {
                title: "Min Bolig",
                icon: "home",
                description: "Tryk på emnerne for at høre korrekt dansk udtale",
                children: ["størrelse", "etage", "beliggenhed"],
                color: "blue"
            },
            størrelse: {
                title: "Størrelse",
                icon: "maximize-2",
                sentence: "Min lejlighed er på firs kvadratmeter, og der er tre værelser.",
                description: "Her kan du fortælle om boligens størrelse.",
                color: "emerald"
            },
            etage: {
                title: "Etage",
                icon: "layers",
                sentence: "Jeg bor på fjerde sal, så jeg har en flot udsigt over byen.",
                description: "Her kan du fortælle hvilken sal du bor på.",
                color: "emerald"
            },
            beliggenhed: {
                title: "Beliggenhed",
                icon: "map-pin",
                sentence: "Min bolig ligger i centrum tæt på indkøb og offentlig transport.",
                description: "Her kan du fortælle om området omkring din bolig.",
                color: "emerald"
            }
        };

        let currentView = 'root';

        function renderView(viewKey) {
            const node = mindmapData[viewKey];
            currentView = viewKey;

            // Opdater tekst
            document.getElementById('cardTitle').innerText = node.title;
            document.getElementById('cardDescription').innerText = node.description;
            
            // Opdater ikoner og farve
            const iconCont = document.getElementById('iconContainer');
            const mainCard = document.getElementById('mainCard');
            iconCont.innerHTML = `<i data-lucide="${node.icon}" class="w-12 h-12"></i>`;
            
            if (viewKey === 'root') {
                mainCard.classList.replace('border-emerald-500', 'border-blue-500');
                iconCont.classList.replace('bg-emerald-50', 'bg-blue-50');
                iconCont.classList.replace('text-emerald-600', 'text-blue-600');
                document.getElementById('backBtn').classList.add('hidden');
                document.getElementById('sentenceBox').classList.add('hidden');
            } else {
                mainCard.classList.replace('border-blue-500', 'border-emerald-500');
                iconCont.classList.replace('bg-blue-50', 'bg-emerald-50');
                iconCont.classList.replace('text-blue-600', 'text-emerald-600');
                document.getElementById('backBtn').classList.remove('hidden');
                document.getElementById('sentenceBox').classList.remove('hidden');
                document.getElementById('sentenceText').innerText = `"${node.sentence}"`;
            }

            // Render børn
            const grid = document.getElementById('childrenGrid');
            grid.innerHTML = '';
            if (node.children) {
                node.children.forEach(childKey => {
                    const child = mindmapData[childKey];
                    grid.innerHTML += `
                        <button onclick="renderView('${childKey}')" class="group p-8 bg-white rounded-[1.5rem] shadow-lg border-2 border-transparent hover:border-blue-400 hover:shadow-2xl transition-all flex flex-col items-center text-center">
                            <div class="mb-4 p-4 bg-blue-50 rounded-2xl text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-all">
                                <i data-lucide="${child.icon}"></i>
                            </div>
                            <span class="font-black text-slate-700 text-xl">${child.title}</span>
                        </button>
                    `;
                });
            }

            lucide.createIcons();
        }

        function goBack() {
            renderView('root');
        }

        function speakText() {
            const text = mindmapData[currentView].sentence;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'da-DK';
            utterance.rate = 0.9; // Lidt langsommere for tydelighed
            window.speechSynthesis.speak(utterance);
        }

        // Start programmet
        window.onload = () => renderView('root');
    </script>
</body>
</html>
