<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konjunktion Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .is-flipped {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">

    <div id="app" class="w-full max-w-md">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold mb-4 text-gray-800">Flashcards: Konjunktioner</h1>
            <label for="langSelect" class="block text-sm font-medium text-gray-600 mb-1">Vælg målsprog:</label>
            <select id="langSelect" class="w-full p-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </select>
        </div>

        <div class="mb-4 flex justify-between items-center text-sm font-semibold text-gray-500">
            <span id="cardCounter">Kort tilbage: 0</span>
        </div>

        <div id="cardContainer" class="flip-card w-full h-80 cursor-pointer">
            <div id="cardInner" class="flip-card-inner">
                <div class="flip-card-front bg-white border border-gray-200">
                    <p class="text-xs uppercase tracking-widest text-gray-400 mb-2 font-bold">Dansk</p>
                    <h2 id="danishWord" class="text-3xl font-bold text-gray-800">---</h2>
                </div>
                <div class="flip-card-back bg-[#f5f5dc] border border-gray-200">
                    <p id="langLabel" class="text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold">Oversættelse</p>
                    <h2 id="translatedWord" class="text-3xl font-bold text-gray-800 text-center leading-tight">---</h2>
                </div>
            </div>
        </div>

        <div id="actionButtons" class="mt-8 flex gap-4 opacity-0 transition-opacity duration-300 pointer-events-none">
            <button onclick="handleAnswer(false)" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform">
                Forkert
            </button>
            <button onclick="handleAnswer(true)" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform">
                Rigtigt
            </button>
        </div>

        <div id="finishScreen" class="hidden text-center py-10">
            <h2 class="text-3xl font-bold text-green-600 mb-4">Godt gået!</h2>
            <p class="text-gray-600 mb-6">Du har lært alle konjunktionerne i dette sæt.</p>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg">
                Start forfra
            </button>
        </div>
    </div>

    <script>
        const dictionary = {
            "Og": { en: "And", bn: "এবং", hi: "और", ur: "اور", uk: "І", ru: "И", fa: "و", tr: "Ve", kmr: "Û", sd: "و", ne: "र", sw: "Na", fr: "Et", twi: "Na", bs: "I", so: "Iyo", sr: "И", ti: "ከምኡውን", zh: "和" },
            "Men": { en: "But", bn: "কিন্তু", hi: "लेकिन", ur: "لیکن", uk: "Але", ru: "Но", fa: "اما", tr: "Ama / Fakat", kmr: "Lê", sd: "بەڵام", ne: "तर", sw: "Lakini", fr: "Mais", twi: "Nanso", bs: "Ali", so: "Laakiin", sr: "Али", ti: "ግን", zh: "但是" },
            "Eller": { en: "Or", bn: "অথবা", hi: "या", ur: "یا", uk: "Або", ru: "Или", fa: "یا", tr: "Veya", kmr: "An", sd: "یان", ne: "वा", sw: "Au", fr: "Ou", twi: "Anaasɛ", bs: "Ili", so: "Ama", sr: "Или", ti: "ወይስ", zh: "或者" },
            "Så": { en: "So", bn: "তাই", hi: "तो", ur: "تو", uk: "Тому / Отже", ru: "Так что / Поэтому", fa: "پس", tr: "Bu yüzden / Öyleyse", kmr: "Ji ber vê", sd: "کەواتە", ne: "त्यसैले", sw: "Hivyo", fr: "Alors / Donc", twi: "Enti", bs: "Tako da", so: "Sidaas darteed", sr: "Тако да", ti: "ስለዚ", zh: "所以" },
            "At (Fx. Hun tror, at...)": { en: "That", bn: "যে", hi: "कि", ur: "کہ", uk: "Що", ru: "Что", fa: "که", tr: "Ki", kmr: "Ku", sd: "کە", ne: "कि", sw: "Kwamba", fr: "Que", twi: "Sɛ", bs: "Da", so: "In", sr: "Да", ti: "ከም", zh: "觉得 / 认为" },
            "Før": { en: "Before", bn: "আগে", hi: "पहले", ur: "پہلے", uk: "До / Перед", ru: "До / Прежде", fa: "قبل", tr: "Önce", kmr: "Berî", sd: "پێش", ne: "अघि", sw: "Kabla", fr: "Avant", twi: "Ansa", bs: "Prije", so: "Ka hor", sr: "Пре", ti: "ቅድሚ", zh: "之前" },
            "Mens (Fx. Jeg gør det mens...)": { en: "While", bn: "যখন", hi: "जबकि", ur: "جبکہ", uk: "Поки", ru: "Пока / В то время как", fa: "در حالی که", tr: "İken / Esnasında", kmr: "Dema ku", sd: "کاتێک", ne: "जब", sw: "Wakati", fr: "Pendant que / Tandis que", twi: "Berɛ a", bs: "Dok", so: "Halka", sr: "Док", ti: "ከሎ", zh: "当...的时候" },
            "Som/der (Fx. Det er ham, der...)": { en: "Who / Which / That", bn: "যে", hi: "जो", ur: "جو", uk: "Який / Хто", ru: "Который / Кто", fa: "که", tr: "Ki / Olan", kmr: "Ku", sd: "کە", ne: "जो", sw: "Ambaye / Ambalo", fr: "Qui", twi: "A", bs: "Koji", so: "Ee", sr: "Који", ti: "ዝ", zh: "的人 / 的那个" },
            "Da (Fx. Da jeg var syg...)": { en: "Since / As / Because", bn: "যেহেতু", hi: "चूँकि", ur: "چونکہ", uk: "Оскільки / Так як", ru: "Так как / Поскольку", fa: "چون", tr: "Çünkü / -den dolayı", kmr: "Ji ber ku", sd: "لەبەرئەوەی", ne: "किनभने", sw: "Kwa kuwa", fr: "Comme / Puisque", twi: "Ɛfiri sɛ", bs: "Pošto / Budući da", so: "Maadaama", sr: "Пошто", ti: "ስለዝኾነ", zh: "因为" },
            "Hvis": { en: "If", bn: "যদি", hi: "यदि / अगर", ur: "اگر", uk: "Якщо", ru: "Если", fa: "اگر", tr: "Eğer", kmr: "Heke", sd: "ئەگەر", ne: "यदि", sw: "Kama", fr: "Si", twi: "Sɛ", bs: "Ako", so: "Haddii", sr: "Ако", ti: "እንተድኣ", zh: "如果" },
            "Når": { en: "When (future/recurring)", bn: "যখন", hi: "जब", ur: "جب", uk: "Коли", ru: "Когда", fa: "وقتی", tr: "Zaman / -diğinde", kmr: "Dema ku", sd: "کاتێک", ne: "जब", sw: "Lini / Wakati", fr: "Quand", twi: "Sɛ... a", bs: "Kada", so: "Marka", sr: "Када", ti: "መዓስ", zh: "当...时" },
            "Dengang": { en: "Back then / When (past)", bn: "সেই সময়", hi: "उस समय", ur: "اس وقت", uk: "Тоді / Коли", ru: "Тогда / Когда", fa: "آن زمان", tr: "O zaman", kmr: "Wê çaxê", sd: "ئەو کاتە", ne: "त्यतिबेला", sw: "Wakati huo", fr: "À l'époque", twi: "Saa mberɛ no", bs: "Tada", so: "Xilligaas", sr: "Тада", ti: "ሽዑ", zh: "那时" },
            "Idet (Fx. Idet jeg ikke var der...)": { en: "As / In that / Since", bn: "যেহেতু", hi: "क्योंकि", ur: "کیونکہ", uk: "Тому що / Оскільки", ru: "Так как / Поскольку", fa: "زیرا", tr: "Çünkü / -dığı için", kmr: "Ji ber ku", sd: "چونکە", ne: "किनभने", sw: "Kwa sababu", fr: "Car / Parce que", twi: "Ɛnam sɛ", bs: "Budući da", so: "Maadaama", sr: "Будући да", ti: "ብምኽንያት", zh: "由于" },
            "Om": { en: "Whether / If / About", bn: "কিনা", hi: "कि क्या", ur: "آیا", uk: "Чи", ru: "Ли / О", fa: "آیا", tr: "Olup olmadığını / Hakkında", kmr: "Gelo", sd: "ئاخۆ", ne: "कि", sw: "Kama", fr: "Si", twi: "Sɛ", bs: "Da li", so: "Haddii", sr: "Да ли", ti: "ወይ", zh: "是否" },
            "End (Fx. Bedre end din)": { en: "Than", bn: "চেয়ে", hi: "से", ur: "سے", uk: "Ніж", ru: "Чем", fa: "از", tr: "-den / -dan daha", kmr: "Ji", sd: "لە", ne: "भन्दा", sw: "Kuliko", fr: "Que", twi: "Sen", bs: "Nego", so: "In ka", sr: "Него", ti: "ካብ", zh: "比" },
            "Inden (Fx. Inden du kom)": { en: "Before", bn: "আগে", hi: "से पहले", ur: "سے پہلے", uk: "До того як", ru: "Перед тем как", fa: "قبل از", tr: "Önce / -den önce", kmr: "Beriya ku", sd: "پێش ئەوەی", ne: "अघि", sw: "Kabla ya", fr: "Avant que", twi: "Ansa na", bs: "Prije nego", so: "Ka hor", sr: "Пре него што", ti: "ቅድሚ", zh: "在...之前" },
            "Selvom": { en: "Even though", bn: "যদিও", hi: "भله ہی", ur: "اگرچہ", uk: "Хоча", ru: "Хотя", fa: "اگرچه", tr: "Rağmen / -sa bile", kmr: "Tevî ku", sd: "سەرەڕای ئەوەی", ne: "भले नै", sw: "Hata kama", fr: "Même si / Bien que", twi: "Sɛ mpo a", bs: "Iako", so: "In kastoo", sr: "Иако", ti: "ኳ እንተኾነ", zh: "虽然" },
            "Fordi": { en: "Because", bn: "कारण", hi: "क्योंकि", ur: "کیونکہ", uk: "Бо / Тому що", ru: "Потому что", fa: "چون / زیرا", tr: "Çünkü", kmr: "Ji ber ku", sd: "لەبەرئەوەی", ne: "किनभने", sw: "Kwa sababu", fr: "Parce que", twi: "Ɛfiri sɛ", bs: "Jer / Zato što", so: "Sababtoo ah", sr: "Јер", ti: "ምክንያቱ", zh: "因为" },
            "Indtil": { en: "Until", bn: "পর্যন্ত", hi: "जब तक", ur: "جب تک", uk: "Доки / Аж до", ru: "Пока не / До", fa: "تا", tr: "Kadar / -e kadar", kmr: "Heta ku", sd: "هەتا", ne: "नभएसम्म", sw: "Mpaka", fr: "Jusqu'à ce que", twi: "Kosi sɛ", bs: "Dok ne", so: "Ilaa", sr: "Док не", ti: "ክሳብ", zh: "直到" },
            "Siden (Fx. Siden jeg ikke...)": { en: "Since / As", bn: "থেকে / যেহেতু", hi: "चूँकि", ur: "چونکہ", uk: "Оскільки / З того часу", ru: "Так как / С тех пор как", fa: "از آنجایی که", tr: "Beri / -den beri / -dığı için", kmr: "Ji ber ku", sd: "لەو کاتەوەی", ne: "भएकाले", sw: "Tangu", fr: "Puisque / Depuis que", twi: "Ɛfiri sɛ", bs: "Pošto", so: "Maadaama", sr: "Пошто", ti: "ካብ", zh: "既然" }
        };

        const languages = [
            { id: "en", name: "Engelsk" }, { id: "bn", name: "Bengali" }, { id: "hi", name: "Hindi" },
            { id: "ur", name: "Urdu" }, { id: "uk", name: "Ukrainsk" }, { id: "ru", name: "Russisk" },
            { id: "fa", name: "Persisk" }, { id: "tr", name: "Tyrkisk" }, { id: "kmr", name: "Kurdisk Kurmanji" },
            { id: "sd", name: "Kurdisk Sorani" }, { id: "ne", name: "Nepalesisk" }, { id: "sw", name: "Kiswahili" },
            { id: "fr", name: "Fransk" }, { id: "twi", name: "Twi" }, { id: "bs", name: "Bosnisk" },
            { id: "so", name: "Somali" }, { id: "sr", name: "Serbisk" }, { id: "ti", name: "Tigrinya" },
            { id: "zh", name: "Mandarin Kinesisk" }
        ];

        let currentLanguage = "en";
        let deck = [];
        let currentIndex = 0;
        let isFlipped = false;
        let isTransitioning = false;

        const langSelect = document.getElementById('langSelect');
        const cardContainer = document.getElementById('cardContainer');
        const cardInner = document.getElementById('cardInner');
        const danishWordEl = document.getElementById('danishWord');
        const translatedWordEl = document.getElementById('translatedWord');
        const langLabel = document.getElementById('langLabel');
        const counterEl = document.getElementById('cardCounter');
        const actionButtons = document.getElementById('actionButtons');
        const finishScreen = document.getElementById('finishScreen');

        function init() {
            languages.forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang.id;
                opt.textContent = lang.name;
                langSelect.appendChild(opt);
            });
            resetGame();
        }

        function resetGame() {
            deck = Object.keys(dictionary).sort(() => Math.random() - 0.5);
            currentIndex = 0;
            isFlipped = false;
            isTransitioning = false;
            finishScreen.classList.add('hidden');
            cardContainer.classList.remove('hidden');
            actionButtons.classList.remove('hidden');
            counterEl.parentElement.classList.remove('hidden');
            updateCard();
        }

        function updateCard() {
            const word = deck[currentIndex];
            danishWordEl.textContent = word;
            translatedWordEl.textContent = dictionary[word][currentLanguage];
            langLabel.textContent = languages.find(l => l.id === currentLanguage).name;
            counterEl.textContent = `Kort tilbage: ${deck.length}`;
            cardInner.classList.remove('is-flipped');
            isFlipped = false;
            actionButtons.style.opacity = "0";
            actionButtons.style.pointerEvents = "none";
        }

        langSelect.addEventListener('change', (e) => {
            currentLanguage = e.target.value;
            updateCard();
        });

        cardContainer.addEventListener('click', () => {
            if (isTransitioning || isFlipped) return;
            isFlipped = true;
            cardInner.classList.add('is-flipped');
            setTimeout(() => {
                actionButtons.style.opacity = "1";
                actionButtons.style.pointerEvents = "auto";
            }, 300);
        });

        function handleAnswer(isCorrect) {
            if (isTransitioning) return;
            isTransitioning = true;
            cardInner.classList.remove('is-flipped');
            actionButtons.style.opacity = "0";
            actionButtons.style.pointerEvents = "none";

            setTimeout(() => {
                if (isCorrect) {
                    deck.splice(currentIndex, 1);
                    if (currentIndex >= deck.length) currentIndex = 0;
                } else {
                    currentIndex = (currentIndex + 1) % deck.length;
                }

                if (deck.length === 0) {
                    showFinishScreen();
                } else {
                    updateCard();
                    isTransitioning = false;
                }
            }, 400);
        }

        function showFinishScreen() {
            cardContainer.classList.add('hidden');
            actionButtons.classList.add('hidden');
            counterEl.parentElement.classList.add('hidden');
            finishScreen.classList.remove('hidden');
            isTransitioning = false;
        }

        init();
    </script>
</body>
</html>
