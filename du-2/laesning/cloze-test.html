            { title: "På sprogskolen", story: ["Jeg går på sprogskole tre gange om ugen nu.", "Min lærer er meget tålmodig og forklarer tingene godt.", "I klassen er vi mange kursister fra forskellige lande.", "Vi øver os på at udtale de svære danske vokaler.", "I pausen snakker vi sammen ude på den brede gang.", "Jeg har fået en god ven, der kommer fra Syrien.", "Vi laver tit vores lektier sammen efter skole.", "Det er vigtigt at bruge sproget så meget som muligt.", "Jeg vil gerne bestå min prøve til næste sommer.", "Min drøm er at finde et arbejde på et kontor."] },
            { title: "Biblioteket", story: ["Biblioteket er et fantastisk sted at lære nye ting.", "Man kan låne både bøger, film og spændende musik.", "Det er helt gratis at få et gult lånerkort.", "Jeg kan godt lide at sidde og læse i fred.", "Der er altid meget stille og roligt på biblioteket.", "Børnene elsker at lege i det store børnehjørne.", "Nogle gange bruger jeg også deres hurtige computere.", "Personalet er altid klar til at hjælpe med spørgsmål.", "Jeg plejer at aflevere mine bøger til tiden.", "Ellers skal man betale en bøde for at glemme det."] },

            { title: "Indkøb i supermarkedet", story: ["Jeg skal købe ind til hele den næste uge.", "Først skriver jeg en lang liste over madvarer.", "I butikken tager jeg en stor vogn ved indgangen.", "Jeg starter i afdelingen med frugt og grøntsager.", "Der er tilbud på æbler og økologiske gulerødder.", "Bagefter finder jeg mælk, rugbrød og en pakke smør.", "Der er desværre en meget lang kø ved kassen.", "Jeg venter tålmodigt på at det bliver min tur.", "Jeg betaler for mine varer med mit betalingskort.", "Til sidst pakker jeg det hele i mine poser."] },
            { title: "En dag på hospitalet", story: ["Min mormor er blevet indlagt til en lille operation.", "Jeg besøger hende på den medicinske afdeling i eftermiddag.", "Hun ligger i en lys stue med en flot udsigt.", "Sygeplejersken kommer ind med medicin og et glas vand.", "Lægen har sagt at alt gik rigtig godt i går.", "Mormor glæder sig meget til at komme hjem igen.", "Jeg har taget en buket blomster med til hende.", "Vi drikker en kop kaffe i den lille café.", "Hun skal hvile sig meget de næste par dage.", "Jeg lover at ringe til hende igen i morgen."] },
            { title: "Jobsamtalen", story: ["I dag skal jeg til en vigtig samtale om job.", "Jeg har taget mit pæne tøj på for første gang.", "Firmaet ligger i en stor bygning nede ved havnen.", "Jeg møder direktøren og en medarbejder fra personalekontoret.", "De spørger ind til min uddannelse og min erfaring.", "Jeg fortæller om de ting jeg er god til.", "Samtalen varer cirka en time i det lille lokale.", "Jeg føler mig faktisk ret sikker og meget glad.", "De vil give mig besked i slutningen af ugen.", "Nu må jeg bare vente og håbe på det bedste."] },
            { title: "Sommerferie i Danmark", story: ["Vi har lejet et lille sommerhus tæt på vandet.", "Hver morgen bader vi i det kolde, friske hav.", "Bagefter cykler vi til bageren efter varme rundstykker.", "Haven er fuld af smukke blomster og grønne træer.", "Vi griller pølser og majs på den store terrasse.", "Om aftenen spiller vi kort og hygger os sammen.", "Der er ingen fjernsyn, så vi læser mange bøger.", "Vejret er heldigvis rigtig flot i denne uge.", "Vi skal også en tur i den lokale dyrepark.", "Det er den bedste ferie vi har haft længe."] },

            { title: "En tur i biografen", story: ["I aften skal vi se en ny dansk film.", "Vi har bestilt billetterne på nettet i god tid.", "Vi mødes foran biografen tyve minutter før start.", "Først køber vi en stor bøtte med lune popcorn.", "Salen er næsten helt fyldt med forventningsfulde mennesker.", "Lyset bliver slukket og filmen starter på lærredet.", "Det er en meget spændende og sørgelig historie.", "Skuespillerne gør det virkelig godt i deres roller.", "Bagefter taler vi om filmen på vej hjem.", "Det var en rigtig god oplevelse at være afsted."] },
            { title: "Fødselsdagsfesten", story: ["I går blev min datter fem år og fejret.", "Vi havde inviteret hele familien og alle hendes venner.", "Der var pyntet op med balloner og danske flag.", "Vi sang fødselsdagssang da hun fik sine mange gaver.", "Hun fik en rød cykel som hun blev glad for.", "Vi spiste boller og en stor kage med lys.", "Børnene legede i haven indtil det blev meget mørkt.", "Det var en dejlig dag for både store og små.", "Datteren var meget træt da hun endelig kom i seng.", "Vi glæder os allerede til næste år i maj."] },
            { title: "En dag i haven", story: ["Foråret er kommet og græsset trænger til at blive slået.", "Jeg finder den gamle plæneklipper frem fra det lille skur.", "Blomsterne begynder at komme op af den sorte jord.", "Jeg planter nogle nye buske nede ved det hvide hegn.", "Det er hårdt arbejde at fjerne alt det dumme ukrudt.", "Solen varmer dejligt mens jeg arbejder med mine hænder.", "Om eftermiddagen tænder vi op i den store grill.", "Vi spiser aftensmad ude under den blå, skyfri himmel.", "Det er skønt at mærke at det endelig er sommer.", "Haven er mit yndlingssted når jeg har helt fri."] },
            { title: "På apoteket", story: ["Jeg føler mig sløj og har en meget høj feber.", "Derfor går jeg hen på apoteket for at få hjælp.", "Jeg trækker et nummer og venter på min tur.", "Da det bliver mit nummer, går jeg op til skranken.", "Jeg skal bruge noget smertestillende til min slemme hovedpine.", "Farmaceuten spørger om jeg tager andet medicin lige nu.", "Hun finder en pakke og forklarer hvordan de bruges.", "Jeg køber også et termometer og nogle varme halstabletter.", "Det koster næsten to hundrede kroner i alt i dag.", "Nu vil jeg gå hjem og lægge mig under dynen."] },
            { title: "I vaskekælderen", story: ["Mandag er min faste dag til at vaske tøj.", "Jeg tager mine to tunge kurve med ned i kælderen.", "Først skal jeg booke en maskine med min vaskebrik.", "Jeg sorterer tøjet i mørke og meget lyse farver.", "Der skal bruges en smule vaskepulver i den lille skuffe.", "En vask tager cirka 45 minutter på det hurtige program.", "Imens går jeg op og gør rent i min stue.", "Bagefter hænger jeg det våde tøj op på tørrestativet.", "Det dufter altid så dejligt af rent og frisk sæbe.", "Jeg hader at stryge mine skjorter bagefter om aftenen."] },
            { title: "En tur i svømmehallen", story: ["Hver lørdag morgen tager jeg hen i den lokale svømmehal.", "Jeg starter med at klæde om i det store omklædningsrum.", "Det er vigtigt at vaske sig grundigt under den varme bruser.", "Vandet i det store bassin er 27 grader varmt i dag.", "Jeg svømmer tyve baner i et roligt og jævnt tempo.", "Der er mange børn der leger og larmer i vandet.", "Efter svømmeturen går jeg en tur ind i den varme sauna.", "Det er meget afslappende for mine ømme muskler i kroppen.", "Til sidst tørrer jeg mig med et stort og blødt håndklæde.", "Jeg føler mig altid meget frisk efter en god svømmetur."] },
            { title: "På politistationen", story: ["Jeg har desværre mistet min pung i bussen i går.", "Derfor er jeg gået på politistationen for at anmelde det.", "Betjenten spørger hvornår og hvor jeg sidst så den.", "Jeg forklarer at den er sort og lavet af læder.", "Der var både penge, kørekort og mit gule sundhedskort i.", "Han skriver det hele ned på sin store, sorte computer.", "Hvis nogen finder den, vil de ringe til mig hurtigst.", "Jeg skal også huske at spærre alle mine hævekort straks.", "Det er virkelig besværligt at miste alle sine personlige ting.", "Jeg håber meget at en ærlig person har fundet den."] },
            { title: "En dag på kontoret", story: ["Jeg arbejder som bogholder i et mellemstort privat firma.", "Min arbejdsdag starter altid klokken otte hver eneste morgen.", "Det første jeg gør er at tjekke mine mange e-mails.", "Jeg drikker en stor kop kaffe mens jeg læser.", "Klokken ti har vi et kort møde i det store lokale.", "Vi taler om de nye projekter og vores fælles budget.", "Til frokost spiser vi sammen i den lille kantine.", "Eftermiddagen går med at skrive tal ind i et system.", "Jeg rydder altid op på mit skrivebord inden jeg går.", "Det er dejligt at have gode kolleger omkring sig hver dag."] },
            { title: "Besøg på museet", story: ["I weekenden besøgte vi det nye museum for moderne kunst.", "Der var en spændende udstilling med meget gamle malerier.", "Vi købte billetterne ved indgangen til den store sal.", "Man må ikke røre ved de mange værdifulde genstande.", "Der var en guide der fortalte om de kendte kunstnere.", "Det var meget lærerigt at høre om Danmarks rige historie.", "Børnene syntes dog det var lidt kedeligt i starten.", "Vi sluttede af med en kage i deres flotte café.", "Jeg købte et flot postkort i den lille museumsbutik.", "Det var en god måde at bruge en regnvejrsdag på."] },
            { title: "Vinter i Danmark", story: ["Det har sneet hele natten og alt er helt hvidt.", "Jeg skal ud og skovle sne foran min egen dør.", "Det er meget koldt, så jeg tager min varme jakke på.", "Børnene finder deres kælke frem og løber ud i sneen.", "De bygger en stor snemand med en lang orange gulerod.", "Vejen er meget glat, så bilerne kører utrolig langsomt.", "Jeg fodrer fuglene med små frø i den kolde have.", "Indenfor tænder vi stearinlys og hygger os med varm kakao.", "Vinteren kan være smuk, men den er også meget lang.", "Vi glæder os til at det snart bliver forår igen."] },
            { title: "En tur på genbrugspladsen", story: ["Vi har ryddet op på loftet i hele denne weekend.", "Der var mange gamle ting som vi ikke bruger mere.", "Vi fylder traileren med pap, jern og gammelt affald.", "På genbrugspladsen skal man sortere det hele meget grundigt.", "Der er forskellige containere til glas, plastik og tungt haveaffald.", "Det er godt for miljøet at vi genbruger vores ting.", "Pladsen er meget stor og der er mange flinke folk.", "Jeg smider også nogle gamle møbler ud i den store boks.", "Nu er der endelig blevet god plads på vores loft.", "Det føles altid rart at få ryddet ordentligt op hjemme."] },
            { title: "Madlavning", story: ["I aften skal jeg lave mad til nogle gode venner.", "Jeg har købt friske ingredienser nede i den lokale butik.", "Menuen står på stegt kylling med masser af lækre grøntsager.", "Først skal jeg skrælle alle de mange store kartofler.", "Jeg snitter løg og hvidløg til den brune sovs.", "Det dufter fantastisk i hele det lille, lyse køkken.", "Jeg dækker bordet med en pæn dug og hvide servietter.", "Maden skal have cirka en time inde i den varme ovn.", "We skal også have en lille dessert med frisk frugt.", "Jeg håber at mine gæster kan lide min hjemmelavede mad."] },
            { title: "I fitnesscentret", story: ["Jeg har besluttet at jeg vil leve meget mere sundt.", "Derfor træner jeg nu tre gange om ugen i centret.", "Jeg starter altid med ti minutter på den hurtige cykel.", "Bagefter løfter jeg nogle tunge vægte for at blive stærk.", "Der er mange mennesker og der spilles meget høj musik.", "Min personlige træner hjælper mig med at gøre det rigtigt.", "Det er vigtigt at drikke rigeligt med vand under træningen.", "Bagefter føler jeg mig meget træt i alle mine muskler.", "Jeg slutter af med at gå i bad og slappe af.", "Det giver mig meget mere energi i min travle hverdag."] },
            { title: "En tur med toget", story: ["Jeg skal besøge min bror som bor i Aarhus nu.", "Jeg tager bussen ind til den store hovedbanegård i morges.", "Toget kører præcis klokken ni fra den lange perron.", "Jeg har reserveret en plads i en helt stille zone.", "Turen tager cirka tre timer tværs gennem det grønne land.", "Jeg kigger ud af vinduet og læser i min bog.", "Kontrolløren kommer for at tjekke min digitale billet på telefonen.", "Vi kører over den store bro over det flotte Storebælt.", "Min bror står og venter på mig ved det aftalte sted.", "Det er nemt og hurtigt at rejse med det danske tog."] },
            { title: "Forældremøde", story: ["I aften er der forældremøde i min søns nye klasse.", "We mødes på skolen klokken sytten i det store lokale.", "Læreren fortæller om alle de ting børnene skal lære nu.", "Vi taler om trivsel og om at lege godt sammen.", "Der er kaffe og kage til alle de fremmødte forældre.", "Vi skal vælge to repræsentanter til det vigtige klasseråd i år.", "Det er godt at møde de andre forældre i klassen.", "Vi aftaler at holde en lille fest for alle børnene.", "Mødet slutter efter halvanden time med en god fælles plan.", "Jeg føler mig nu mere tryg ved min søns skolegang."] },
            { title: "Til frisøren", story: ["Mit hår er blevet alt for langt og meget tykt.", "Jeg har derfor bestilt en tid hos min faste frisør.", "Hun vasker mit hår med en dejlig og mild shampoo.", "Vi taler om løst og fast mens hun klipper mig.", "Jeg vil gerne have det lidt kortere i den ene side.", "Hun bruger en skarp saks og en elektrisk maskine bagefter.", "Til sidst tørrer hun det og putter lidt voks i.", "Jeg er meget tilfreds med det flotte og nye resultat.", "Det koster tre hundrede kroner for en herreklip i dag.", "Jeg bestiller en ny tid til om to måneder allerede."] },
            { title: "På byggepladsen", story: ["Der bliver bygget mange nye lejligheder nede ved den havn.", "Arbejderne har hjelme på for at passe på deres hoveder.", "Der er store kraner der løfter de tunge, grå betonvægge.", "Larmen fra maskinerne kan høres i hele det kvarter.", "Murerne er i gang med at lægge de røde mursten.", "Det skal være færdigt inden det bliver rigtig koldt vinter.", "Jeg går forbi byggeriet hver dag når jeg skal på arbejde.", "Det bliver spændende at se det færdige og flotte resultat.", "Mange mennesker har allerede købt en bolig i det byggeri.", "Byen udvikler sig hurtigt og bliver meget større end før."] },
            { title: "En tur på stranden", story: ["Det er en meget varm dag med høj, blå himmel.", "Vi tager bussen ud til den store, hvide sandstrand.", "Der er mange mennesker der ligger og soler sig der.", "Børnene løber direkte ud i det blå og kølige vand.", "Vi har smurt os ind i et tykt lag solcreme.", "Jeg læser en spændende avis under den store, gule parasol.", "Vi har taget en køletaske med med juice og madpakker.", "Om eftermiddagen køber vi alle en meget stor gammeldags is.", "Det er den perfekte måde at bruge en varm sommerdag.", "Vi tager trætte og solbrændte hjem sidst på den eftermiddag."] },
            { title: "I banken", story: ["Jeg har brug for at tale med en bankrådgiver snart.", "Jeg vil gerne låne nogle penge til en ny bil.", "Vi sidder i et lille kontor og kigger på tal.", "Han gennemgår mit budget og min månedlige faste indkomst.", "Renten er desværre steget en del det sidste halve år.", "Jeg skal sende mine sidste tre lønsedler til ham digitalt.", "Det tager et par dage før jeg får et svar.", "Jeg håber meget at de kan godkende mit store lån.", "Det er dyrt at låne penge, så jeg tænker mig om.", "Banken ligger lige midt på den store og travle gågade."] },
            { title: "Gør-det-selv", story: ["Min vandhane i køkkenet er begyndt at dryppe meget.", "Jeg vil prøve at reparere den helt selv i dag.", "Først skal jeg lukke for det kolde og varme vand.", "Jeg bruger en stor svensknøgle til at løsne den med.", "Det er sværere end det ser ud på de videoer.", "Jeg har købt en ny pakning nede i det byggemarked.", "Efter en times arbejde virker det hele endelig helt perfekt.", "Jeg er stolt af at jeg kunne fikse det selv.", "Det sparede mig for mange penge til en dyr blikkenslager.", "Næste projekt er at male alle væggene i min stue."] },
            { title: "Til koncert", story: ["I går var jeg til koncert med mit yndlingsband.", "Det foregik i en stor hal med plads til mange.", "Der var en fantastisk stemning og folk sang meget højt.", "Musikken var utrolig god, men også meget høj for ørerne.", "De spillede alle de sange som jeg kender så godt.", "Vi stod helt oppe foran den store og flotte scene.", "Bandet spillede i to timer uden at holde en pause.", "Efter koncerten købte jeg en t-shirt med deres store logo.", "Mine ben var meget ømme efter at have stået op.", "Det var en oplevelse som jeg aldrig vil glemme nogensinde."] },
            { title: "På biblioteket med børnene", story: ["Hver onsdag tager jeg mine to små børn på biblioteket.", "De elsker at kigge i de mange farverige og sjove billedbøger.", "Der er et hyggeligt hjørne med puder hvor vi sidder.", "Jeg læser højt for dem om en modig lille bjørn.", "Bagefter låner vi nogle film og et par gode spil.", "Vi bruger vores lånerkort i den store, smarte maskine selv.", "Man skal huske at være stille så man ikke forstyrrer.", "Personalet hjælper os med at finde de helt rigtige ting.", "Det er en god og helt gratis aktivitet for familier.", "Vi tager bussen hjem og læser videre i den stue."] },
            { title: "En dag i tivoli", story: ["Vi har købt et årskort til den smukke, gamle have.", "Der er så mange flotte blomster og store, grønne træer.", "Børnene vil prøve alle de vilde og hurtige rutsjebaner.", "Jeg bliver desværre hurtigt svimmel af at køre rundt i ring.", "Vi spiser en hotdog ved en af de små boder.", "Der er altid en magisk stemning med de mange lys.", "Vi ser en flot koncert på den store, åbne plæne.", "Det er en dyr fornøjelse, men det er alle pengene værd.", "We bliver der indtil de lukker sent om den aften.", "Alle er glade og meget mætte af de gode indtryk."] },
            { title: "I lufthavnen", story: ["Vi skal flyve på ferie til det varme Spanien i dag.", "Vi ankommer til lufthavnen to timer før vores afgang her.", "Først skal vi aflevere vores store kufferter ved den skranke.", "Bagefter går vi gennem den meget grundige og strenge sikkerhedskontrol.", "Jeg køber en flaske vand og et blad i butikken.", "Vi finder vores gate og venter på at gå ombord.", "Flyveturen tager tre timer og forløber meget roligt og godt.", "Jeg kan godt lide at kigge ned på de skyer.", "I lufthavnen i Malaga henter vi vores lejebil med det samme.", "Nu kan vores dejlige ferie i solen endelig starte rigtigt."] },
            { title: "På sprogcenteret", story: ["Jeg lærer dansk for at kunne få et godt job.", "Det er svært at lære udtalen af de mange vokaler.", "Vi arbejder meget i grupper og taler med hinanden her.", "Læreren skriver de vigtige ord op på den hvide tavle.", "Vi bruger også computere til at lave vores svære opgaver.", "Hver dag får vi lektier for som vi skal lave hjemme.", "Det er vigtigt at øve sig hver dag i ugen.", "Jeg kan forstå mere og mere når folk taler dansk.", "Min plan er at tage den afsluttende prøve til sommer.", "Det kræver meget tålmodighed at lære et helt nyt sprog."] },
            { title: "Til bryllup", story: ["Min fætter skal giftes med sin kæreste gennem mange år.", "Vielsen foregår i en smuk, hvid kirke ude på landet.", "Bruden har en meget flot og lang hvid kjole på.", "Efter kirken kører vi alle hen til den store fest.", "Der er dækket op med god mad og meget vin.", "Der bliver holdt mange sjove og meget lange taler i dag.", "We danser hele natten til det gode og glade musik.", "Det er en festlig dag fyldt med kærlighed og glæde.", "Gaven til brudeparret var en rejse til det fjerne Italien.", "Vi var meget trætte da vi kørte hjem i morges."] },
            { title: "En tur på markedet", story: ["Hver lørdag er der marked på det store, åbne torv.", "Bønderne sælger deres friske grøntsager og meget søde frugter.", "Jeg køber en stor pose med røde og saftige æbler.", "Der er også en mand der sælger meget gammelt værktøj.", "Stemningen er hyggelig og der er mange mennesker ude i dag.", "Jeg køber også en buket flotte blomster til min kone.", "Man kan smage på forskellige oste ved den lille vogn.", "Det er billigere at købe ind her end i supermarkedet.", "Jeg nyder at gå rundt og kigge på de ting.", "Klokken to pakker alle boderne sammen og kører deres vej."] },
            { title: "I biografen med vennerne", story: ["Vi havde aftalt at mødes foran biografen klokken tyve.", "Vi ville se den nye actionfilm som alle taler om.", "Vi købte billetterne på række otte midt i den sal.", "Popcorn og sodavand hører selvføgelig med til en god film.", "Filmen var meget lang, men den var aldrig rigtig kedelig.", "Der var mange spændende scener og gode, kendte skuespillere bagefter.", "Vi gik på en café bagefter for at diskutere slutningen.", "Det er altid hyggeligt at lave noget sammen i hverdagen.", "Næste gang er det min tur til at vælge filmen.", "Jeg kom ret sent i seng og var træt dagen efter."] },
            { title: "Vejret i Danmark", story: ["Man ved aldrig hvordan vejret bliver her i det land.", "Om morgenen skinner solen, og om eftermiddagen regner det meget.", "Det blæser tit rigtig meget, især nede ved det vestlige hav.", "Om sommeren kan det blive meget varmt og ret fugtigt.", "Om vinteren er dagene meget korte og utrolig mørke her.", "Mange danskere taler altid om vejret når de mødes tilfældigt.", "Man skal altid have en paraply eller en regnjakke med.", "Det er vigtigt at få noget sollys mens det er der.", "Vejrudsigten i fjernsynet er meget populær hos alle de folk.", "Jeg kan bedst lide de milde og solrige dage i foråret."] },
            { title: "En dag i skolen", story: ["Børnene skal være i skole senest klokken otte hver morgen.", "De har mange forskellige fag som dansk, matematik og engelsk.", "I frikvarteret leger de ude i den store og sjove skolegård.", "De spiser deres medbragte madpakker klokken elleve i det lokale.", "Min datter er meget glad for sin nye og søde lærer.", "De bruger tablets og computere til mange af deres opgaver.", "Efter skole går de i SFO og leger med vennerne.", "Det er vigtigt at de får bevæget sig hver eneste dag.", "Vi hjælper dem med deres lektier hver dag efter aftensmad.", "Uddannelse er vejen til en god og sikker fremtid her."] },
            { title: "Besøg hos lægen", story: ["Jeg har haft ondt i min ryg i lang tid.", "Derfor har jeg fået en tid hos min praktiserende læge.", "Jeg sidder i venteværelset sammen med tre andre syge folk.", "Lægen undersøger mig og stiller nogle meget svære spørgsmål her.", "Hun siger at jeg skal lave nogle specielle øvelser hver dag.", "Jeg får en recept på noget smertestillende og stærkt medicin.", "Det er vigtigt at jeg passer godt på min svage krop.", "Hun henviser mig også til en dygtig og erfaren fysioterapeut.", "Jeg håber at smerterne snart forsvinder helt fra min ryg.", "Det er nemt at bestille tider på den smarte app."] },
            { title: "På cykel gennem byen", story: ["Danmark er et land med rigtig mange gode og brede cykelstier.", "Jeg cykler til arbejde hver dag uanset hvordan vejret er.", "Det tager cirka tyve minutter at komme gennem den by.", "Det er god motion og meget billigere end at køre bil.", "Man skal huske at bruge cykelhjelm for at være sikker.", "Der er mange lyskryds hvor man skal stoppe for rødt.", "Om morgenen er der meget travlt på de mange stier.", "Jeg har købt en ny cykel med syv gode gear.", "Det er vigtigt at have lys på når det er mørkt.", "Jeg elsker at mærke vinden i mit ansigt når jeg kører."] },
            { title: "En tur i zoologisk have", story: ["Vi skal se de mange vilde dyr i den store have.", "Isbjørnene svømmer rundt i det store og kolde, blå bassin.", "Elefanterne får mad af deres dyrepassere klokken elleve i formiddag.", "Der er en meget lang kø for at se de aber.", "Børnene synes at de høje giraffer er meget sjove og søde.", "Vi har taget vores egne madpakker med til den frokost.", "Der er en stor legeplads hvor børnene kan lege frit.", "Vi lærer om hvordan man passer på de truede dyr.", "Det er en lærerig og spændende dag for hele familien her.", "We køber en lille bamse i den butik ved udgangen."] },
            { title: "Affaldssortering", story: ["I Danmark skal vi sortere vores affald i mange dele.", "Vi har forskellige spande til papir, plastik, metal og madaffald.", "Det er vigtigt for miljøet at vi genbruger vores ting.", "Gamle batterier skal afleveres i en speciel lille rød boks.", "Glas og flasker skal afleveres i de store containere på gaden.", "Det kan være lidt svært at huske reglerne i starten.", "Kommunen henter vores affald hver anden uge på den dag.", "Vi skal passe godt på vores natur og vores fælles jord.", "Det starter med de små ting som vi gør hver dag.", "Jeg lærer mine børn at de aldrig må smide affald."] },
            { title: "En tur i teatret", story: ["Min kone og jeg skal i teatret i aften her.", "Vi skal se et meget kendt og klassisk dansk teaterstykke.", "Vi har taget vores pæne og fine tøj på i dag.", "Teatret er meget gammelt og har en smuk, rød indretning.", "Der er en helt særlig stemning i den store, mørke sal.", "Skuespillerne taler meget højt så alle i salen kan høre.", "Der er en pause på tyve minutter midt i stykket.", "Vi får et glas kølig hvidvin i den flotte bar.", "Det er en meget anderledes oplevelse end at se film.", "Vi taler om den spændende handling hele vejen hjem i bilen."] },
            { title: "I bussen", story: ["Jeg tager bussen hver dag når jeg skal på sprogskole.", "Jeg bruger mit rejsekort når jeg stiger ind og ud.", "Bussen er tit meget fyldt med mennesker om morgenen her.", "Jeg prøver at finde en siddeplads nede bagest i bussen.", "Jeg lytter til musik eller læser i min tykke bog.", "Chaufføren kører meget forsigtigt gennem de smalle og travle gader.", "Der er en skærm der viser det næste stop tydeligt.", "Nogle gange er bussen desværre lidt forsinket på grund af trafikken.", "Det er vigtigt at man tager hensyn til de andre passagerer.", "Jeg står af ved stationen og går det sidste korte stykke."] },
            { title: "På campingferie", story: ["Vi har købt et stort telt og soveposer til turen.", "We skal sove på en campingplads tæt ved den skov.", "Der er mange aktiviteter for børnene hele dagen lang her.", "Vi laver mad over et lille gasblus uden for teltet.", "Det er hyggeligt at sidde ude under de mange stjerner.", "Der er fælles bad og toiletter som alle skal dele.", "Vi har lært nogle meget flinke folk fra Tyskland at kende.", "Om morgenen henter vi friske rundstykker i den lille butik.", "Det er en billig og meget afslappende måde at holde ferie.", "Vi håber bare at det ikke begynder at regne meget."] },
            { title: "En dag i storcentret", story: ["Jeg mangler et par nye sko og en varm vinterjakke.", "Derfor tager jeg bussen ud til det store, moderne storcenter.", "Der er over hundrede forskellige butikker samlet på et sted.", "Jeg prøver mange forskellige ting inden jeg endelig beslutter mig.", "Der er udsalg og man kan spare mange penge lige nu.", "Jeg spiser en hurtig sandwich i det store madområde der.", "Der er mange mennesker og meget larm i de brede gange.", "Jeg finder også en gave til min søsters store fødselsdag.", "Det er nemt at have det hele samlet under et tag.", "Jeg er meget træt i mine ben efter den lange tur."] },
            { title: "Sociale medier", story: ["Mange mennesker bruger meget tid på deres mange sociale medier.", "Man kan dele billeder og skrive beskeder til sine gode venner.", "Det er en nem måde at holde kontakt med sin familie.", "Men det kan også tage for meget af ens dyrebare tid.", "Jeg prøver at lægge min telefon væk når jeg spiser.", "Man skal passe på hvad man lægger ud på det net.", "Nogle gange er det bedre at mødes i den virkelige verden.", "Jeg bruger det mest til at læse nyheder og spændende artikler.", "Det er vigtigt at have en god balance i sit liv.", "Mine børn må kun bruge deres tablets en time om dagen."] },
            { title: "Livet i byen", story: ["Jeg bor i en lejlighed midt i en meget stor by.", "Der er altid liv i gaderne og mange ting at lave.", "Jeg har kort vej til både indkøb og offentlig transport her.", "Der er mange caféer og restauranter lige rundt om det hjørne.", "Ulempen er at der også er meget larm fra bilerne.", "Jeg savner nogle gange at have en lille, grøn have selv.", "Der er dog en park tæt på hvor jeg kan gå.", "Byen har mange kulturelle tilbud som biografer og spændende museer.", "Jeg kender mange af de folk der bor i min opgang.", "Det er et spændende sted at bo mens man er ung."] },
            { title: "En tur i skoven om vinteren", story: ["Selvom det er koldt, er det dejligt at gå i skoven.", "Træerne står helt uden blade og jorden er meget hård.", "Vi kan se vores egen ånde i den kolde og friske luft.", "Der er ingen fugle der synger på denne tid af året.", "Vi går en tur rundt om den store, frosne sø her.", "Isen er ikke sikker, så man må ikke gå ud på den.", "Vi har en termokande med varm kaffe med i tasken.", "Hunden elsker at løbe i den tørre og visne skovbund.", "Vi får røde kinder og bliver kolde på vores næser.", "Det er skønt at komme ind i varmen bagefter igen."] }
        ];

        let currentTextIndex = 0;
        let solutions = [];

        function initGame() {
            currentTextIndex = Math.floor(Math.random() * texts.length);
            loadText();
        }

        function loadText() {
            const data = texts[currentTextIndex];
            document.getElementById('text-title').textContent = data.title;
            document.getElementById('progress-text').textContent = `Opgave ${currentTextIndex + 1} af ${texts.length}`;
            
            const contentArea = document.getElementById('content-area');
            const wordListArea = document.getElementById('word-list');
            contentArea.innerHTML = '';
            wordListArea.innerHTML = '';
            document.getElementById('score-result').textContent = '';
            document.getElementById('next-button').classList.add('hidden');
            document.getElementById('check-button').classList.remove('hidden');

            solutions = [];
            const allWords = [];

            data.story.forEach((sentence, index) => {
                const words = sentence.trim().split(' ');
                const lastWordRaw = words[words.length - 1];
                const cleanWord = lastWordRaw.replace(/[.,!?]/g, '');
                const punctuation = lastWordRaw.slice(cleanWord.length);
                
                solutions.push(cleanWord.toLowerCase());
                allWords.push(cleanWord);

                const span = document.createElement('span');
                span.innerHTML = words.slice(0, -1).join(' ') + ' ';
                
                const select = document.createElement('select');
                select.className = 'cloze-select';
                select.id = `select-${index}`;
                select.innerHTML = `<option value="">---</option>`;
                
                span.appendChild(select);
                span.innerHTML += punctuation + ' ';
                contentArea.appendChild(span);
            });

            const shuffledWords = [...allWords].sort(() => Math.random() - 0.5);
            shuffledWords.forEach(word => {
                const item = document.createElement('span');
                item.className = 'word-item';
                item.textContent = word;
                wordListArea.appendChild(item);
            });

            const selects = document.querySelectorAll('.cloze-select');
            selects.forEach(sel => {
                const sortedOptions = [...allWords].sort((a, b) => a.localeCompare(b, 'da'));
                sortedOptions.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt.toLowerCase();
                    o.textContent = opt;
                    sel.appendChild(o);
                });
            });
        }

        document.getElementById('check-button').onclick = function() {
            let correctCount = 0;
            solutions.forEach((sol, i) => {
                const sel = document.getElementById(`select-${i}`);
                const val = sel.value;
                
                if (val === sol) {
                    correctCount++;
                    sel.classList.add('correct-answer');
                } else {
                    sel.classList.add('wrong-answer');
                    const correctSpan = document.createElement('span');
                    correctSpan.className = 'solution-text';
                    correctSpan.textContent = `(${sol})`;
                    sel.parentNode.insertBefore(correctSpan, sel.nextSibling);
                }
                sel.disabled = true;
            });

            document.getElementById('score-result').textContent = `Resultat: ${correctCount} / ${solutions.length} rigtige!`;
            document.getElementById('check-button').classList.add('hidden');
            document.getElementById('next-button').classList.remove('hidden');
        };

        document.getElementById('next-button').onclick = function() {
            currentTextIndex = (currentTextIndex + 1) % texts.length;
            loadText();
        };

        window.onload = initGame;
    </script>
</body>
</html>
