<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sproglæring Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 {
            perspective: 1000px;
        }
        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .flipped {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            padding: 2rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 md:p-8">

    <div id="app" class="w-full max-w-2xl">
        <!-- Header & Sprogvælger -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Sproglæring</h1>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <label for="language-select" class="block text-sm font-medium text-gray-700 mb-2">Vælg målsprog:</label>
                <select id="language-select" class="w-full p-2 border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <!-- Options generated via JS -->
                </select>
            </div>
        </header>

        <!-- Status -->
        <div id="status-bar" class="mb-4 flex justify-between items-center px-2 text-gray-600 font-medium">
            <span id="cards-left">Kort tilbage: 0</span>
            <span id="current-lang-display">Sprog: Dansk</span>
        </div>

        <!-- Spil Område -->
        <main id="game-container" class="relative">
            <!-- Flashcard -->
            <div class="perspective-1000 w-full h-80 cursor-pointer mb-8" id="card-trigger">
                <div id="card-inner" class="flip-card-inner">
                    <!-- Forside (Dansk) -->
                    <div class="flip-card-front bg-white text-black border border-gray-200">
                        <p id="danish-text">Indlæser...</p>
                    </div>
                    <!-- Bagside (Målsprog) -->
                    <div class="flip-card-back bg-[#f5f5dc] text-black border border-gray-200">
                        <p id="target-text">Oversættelse</p>
                    </div>
                </div>
            </div>

            <!-- Knapper (Vises kun når kortet er vendt) -->
            <div id="action-buttons" class="flex gap-4 justify-center opacity-0 pointer-events-none transition-opacity duration-300">
                <button id="btn-wrong" class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-full font-bold shadow-lg transform active:scale-95 transition-all">
                    Forkert
                </button>
                <button id="btn-right" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-full font-bold shadow-lg transform active:scale-95 transition-all">
                    Rigtigt
                </button>
            </div>
        </main>

        <!-- Færdig Skærm -->
        <div id="finished-screen" class="hidden text-center bg-white p-12 rounded-2xl shadow-xl border border-gray-200">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold mb-2">Flot klaret!</h2>
            <p class="text-gray-600 mb-8">Du har lært alle ordene i denne runde.</p>
            <button id="btn-restart" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-full font-bold shadow-lg transition-all">
                Start forfra
            </button>
        </div>
    </div>

        };

        // App Tilstand
        let currentLanguage = "Engelsk";
        let deck = [];
        let currentIndex = 0;
        let isFlipped = false;
        let isTransitioning = false;

        // Elementer
        const langSelect = document.getElementById('language-select');
        const danishText = document.getElementById('danish-text');
        const targetText = document.getElementById('target-text');
        const cardsLeftDisplay = document.getElementById('cards-left');
        const currentLangDisplay = document.getElementById('current-lang-display');
        const cardInner = document.getElementById('card-inner');
        const cardTrigger = document.getElementById('card-trigger');
        const actionButtons = document.getElementById('action-buttons');
        const finishedScreen = document.getElementById('finished-screen');
        const gameContainer = document.getElementById('game-container');
        
        const btnRight = document.getElementById('btn-right');
        const btnWrong = document.getElementById('btn-wrong');
        const btnRestart = document.getElementById('btn-restart');

        // Initialisering
        function init() {
            // Fyld sprogvælger
            Object.keys(translations).forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang;
                opt.textContent = lang;
                langSelect.appendChild(opt);
            });

            startNewGame();
        }

        function startNewGame() {
            currentLanguage = langSelect.value;
            deck = wordList.map((word, index) => ({
                danish: word,
                translation: translations[currentLanguage][index]
            }));
            
            // Shuffle deck
            deck.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            isFlipped = false;
            isTransitioning = false;
            
            finishedScreen.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            actionButtons.classList.add('opacity-0', 'pointer-events-none');
            cardInner.classList.remove('flipped');
            
            updateUI();
        }

        function updateUI() {
            if (deck.length === 0) {
                showFinished();
                return;
            }
            
            danishText.textContent = deck[currentIndex].danish;
            targetText.textContent = deck[currentIndex].translation;
            cardsLeftDisplay.textContent = `Kort tilbage: ${deck.length}`;
            currentLangDisplay.textContent = `Sprog: ${currentLanguage}`;
        }

        function showFinished() {
            gameContainer.classList.add('hidden');
            finishedScreen.classList.remove('hidden');
        }

        // Event Listeners
        langSelect.addEventListener('change', startNewGame);

        cardTrigger.addEventListener('click', () => {
            if (isTransitioning || isFlipped) return;
            
            isFlipped = true;
            cardInner.classList.add('flipped');
            
            // Vis knapper efter lille delay for animation
            setTimeout(() => {
                actionButtons.classList.remove('opacity-0', 'pointer-events-none');
            }, 300);
        });

        btnRight.addEventListener('click', (e) => {
            e.stopPropagation();
            handleAnswer(true);
        });

        btnWrong.addEventListener('click', (e) => {
            e.stopPropagation();
            handleAnswer(false);
        });

        btnRestart.addEventListener('click', startNewGame);

        function handleAnswer(isCorrect) {
            if (isTransitioning) return;
            isTransitioning = true;

            // Skjul knapper med det samme
            actionButtons.classList.add('opacity-0', 'pointer-events-none');

            // 1. Vend kortet tilbage til forsiden
            cardInner.classList.remove('flipped');
            isFlipped = false;

            // 2. Vent 400ms før vi opdaterer data
            setTimeout(() => {
                if (isCorrect) {
                    // Fjern fra bunken
                    deck.splice(currentIndex, 1);
                } else {
                    // Flyt til bunden eller bare lad det blive (vi roterer currentIndex)
                    // Her flytter vi det bare til bunden af bunken
                    const currentCard = deck.splice(currentIndex, 1)[0];
                    deck.push(currentCard);
                }

                // Sørg for index er validt (vigtigt hvis deck er blevet tomt eller mindre)
                if (deck.length > 0) {
                    currentIndex = currentIndex % deck.length;
                } else {
                    currentIndex = 0;
                }

                updateUI();
                isTransitioning = false;
            }, 400);
        }

        // Kør init
        window.onload = init;
    </script>
