<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprog Flashcards - 2. Verdenskrig & Hverdagsord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180px);
        }
        .flipped {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 font-sans text-gray-900">

    <div id="app" class="w-full max-w-md">
        <!-- Overskrift & Sprogvalg -->
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold mb-4">Flashcards</h1>
            
            <div class="bg-white p-3 rounded-lg shadow-sm">
                <label for="languageSelect" class="block text-sm font-medium text-gray-600 mb-1 text-left">Vælg målsprog:</label>
                <select id="languageSelect" class="w-full p-2 border rounded-md bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                    <!-- Sprogmuligheder fyldes af JS -->
                </select>
            </div>
        </header>

        <!-- Status Bar -->
        <div id="statusBar" class="flex justify-between items-center mb-4 px-2">
            <span class="text-sm font-semibold text-gray-600">Kort tilbage: <span id="remainingCount">0</span></span>
            <div class="h-2 flex-1 mx-4 bg-gray-300 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Spil Område -->
        <main id="gameArea" class="relative h-80 perspective-1000 cursor-pointer mb-8">
            <div id="cardInner" class="relative w-full h-full transition-transform duration-500 preserve-3d shadow-xl rounded-2xl">
                <!-- Forside (Dansk) -->
                <div class="absolute inset-0 backface-hidden bg-white rounded-2xl flex items-center justify-center p-6 border-2 border-gray-200">
                    <p id="danishWord" class="text-3xl font-bold text-center"></p>
                </div>
                <!-- Bagside (Målsprog) -->
                <div class="absolute inset-0 backface-hidden bg-[#f5f5dc] rounded-2xl flex items-center justify-center p-6 border-2 border-beige-300 flipped">
                    <p id="targetWord" class="text-3xl font-bold text-center"></p>
                </div>
            </div>
        </main>

        <!-- Kontrol Knapper -->
        <div id="controls" class="flex gap-4 opacity-0 pointer-events-none transition-opacity duration-300">
            <button id="btnWrong" class="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl shadow-lg transform active:scale-95 transition-all">
                Forkert
            </button>
            <button id="btnRight" class="flex-1 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl shadow-lg transform active:scale-95 transition-all">
                Rigtigt
            </button>
        </div>

        <!-- Slutskærm -->
        <div id="finishScreen" class="hidden fixed inset-0 bg-gray-100 flex flex-center flex-col items-center justify-center p-6 z-50">
            <div class="text-center">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold mb-2">Færdig!</h2>
                <p class="text-gray-600 mb-8">Du har lært alle ordene i denne runde.</p>
                <button onclick="resetGame()" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 transition-colors shadow-lg">
                    Start forfra
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data Struktur med tilføjet Thai (th)
        const vocabulary = [
            { dk: "2. verdenskrig", en: "World War II", bn: "দ্বিতীয় বিশ্বযুদ্ধ", hi: "द्वितीय विश्व युद्ध", ur: "دوسری عالمی جنگ", uk: "Друга світова війна", ru: "Вторая мировая война", fa: "جنگ جهانی دوم", tr: "İkinci Dünya Savaşı", km: "Şerê Cîhanê yê Duyem", so: "Dagaalkii Labaad ee Adduunka", ne: "दोस्रो विश्वयुद्ध", sw: "Vita vya Pili vya Dunia", fr: "Seconde Guerre mondiale", tw: "Wiase Ko a Ɛtɔ so Mmienu", bs: "Drugi svjetski rat", som: "Dagaalkii Labaad ee Adduunka", sr: "Други светски рат", ti: "ካልኣይ ውግእ ዓለም", zh: "第二次世界大战", tg: "Ҷанги дуюми ҷаҳон", es: "Segunda Guerra Mundial", th: "สงครามโลกครั้งที่สอง" },
            { dk: "selvstændig", en: "independent", bn: "স্বাধীন", hi: "स्वतंत्र", ur: "آزاد", uk: "незалежний", ru: "независимый", fa: "مستقل", tr: "bağımsız", km: "serbixwe", so: "serbixwe", ne: "स्वतन्त्र", sw: "kujitegemea", fr: "indépendant", tw: "wo ho nso", bs: "samostalan", som: "madax-bannaan", sr: "самосталан", ti: "ነጻ", zh: "独立", tg: "мустақил", es: "independiente", th: "เป็นอิสระ / พึ่งพาตนเอง" },
            { dk: "at bestemme", en: "to decide / to determine", bn: "স্থির করা", hi: "तย करना", ur: "فیصلہ کرنا", uk: "вирішувати", ru: "решать", fa: "تصمیم گرفتن", tr: "karar vermek", km: "biryar dan", so: "biryar dan", ne: "निर्णय गर्नु", sw: "kuamua", fr: "décider", tw: "si gyinae", bs: "odlučiti", som: "go'aansasho", sr: "одлучити", ti: "ምውሳን", zh: "决定", tg: "тасмим гирифтан", es: "decidir", th: "ตัดสินใจ / กำหนด" },
            { dk: "fremlægge", en: "to present / to submit", bn: "পেশ করা", hi: "प्रस्तुत करना", ur: "پیش کرنا", uk: "представляти", ru: "представлять", fa: "ارائه دادن", tr: "sunmak", km: "pêşkêş kirin", so: "pêşkêş kirin", ne: "प्रस्तुत गर्नु", sw: "kuwasilisha", fr: "présenter", tw: "da no adi", bs: "izlagati", som: "soo bandhigid", sr: "представити", ti: "ምቕራብ", zh: "陈述 / 展示", tg: "пешниҳод кардан", es: "presentar", th: "นำเสนอ" },
            { dk: "at lære udenad", en: "to memorize", bn: "মুখস্থ করা", hi: "कंठस्थ करना", ur: "زبانی یاد کرنا", uk: "вивчати напам'ять", ru: "учить наизусть", fa: "حفظ کردن", tr: "ezberlemek", km: "ezber kirin", so: "ezber kirin", ne: "कण्ठ गर्नु", sw: "kukariri", fr: "apprendre par cœur", tw: "sua ne tiri mu", bs: "učiti napamet", som: "kordahabasho", sr: "учити напамет", ti: "ብቓልካ ምፍላጥ", zh: "背诵", tg: "аз ёд кардан", es: "memorizar", th: "ท่องจำ" },
            { dk: "at larme", en: "to make noise", bn: "গোলমাল করা", hi: "शोर मचाना", ur: "شور مچانا", uk: "шуміти", ru: "шуметь", fa: "سر و صدا کردن", tr: "gürültü yapmak", km: "deng kirin", so: "deng kirin", ne: "हल्ला गर्नु", sw: "kupiga kelele", fr: "faire du bruit", tw: "yɛ dede", bs: "praviti buku", som: "buuq samayn", sr: "правити буку", ti: "ጫውጫው ምባል", zh: "吵闹", tg: "ғавғо кардан", es: "hacer ruido", th: "ทำเสียงดัง" },
            { dk: "hovedstad", en: "capital city", bn: "রাজধানী", hi: "राजधानी", ur: "دارالحکومت", uk: "столиця", ru: "столица", fa: "پایتخت", tr: "başkent", km: "paytext", so: "paytext", ne: "राजधानी", sw: "mji mkuu", fr: "capitale", tw: "ahenkuro", bs: "glavni grad", som: "magaalo madax", sr: "главни град", ti: "ርእሰ ከተማ", zh: "首都", tg: "пойтахт", es: "capital", th: "เมืองหลวง" },
            { dk: "at være skrap", en: "to be strict / to be tough", bn: "কঠোর হওয়া", hi: "सख्त होना", ur: "سخت ہونا", uk: "бути суворим", ru: "быть строгим", fa: "سخت‌گیر بودن", tr: "sert olmak", km: "tund bûn", so: "tund bûn", ne: "कडा हुनु", sw: "kuwa mkali", fr: "être sévère", tw: "yɛ denden", bs: "biti strog", som: "ahaan adag", sr: "бити строг", ti: "ጥንኩር ምዃን", zh: "严厉", tg: "сахтгир будан", es: "ser estricto", th: "เข้มงวด / ดุ" },
            { dk: "lussing", en: "slap", bn: "চড়", hi: "थप्पड़", ur: "تھپڑ", uk: "ляпас", ru: "пощечина", fa: "سیลิ", tr: "tokat", km: "şeqam", so: "şeqam", ne: "थप्पड", sw: "kofi", fr: "gifle", tw: "asotɔ", bs: "šamar", som: "dharbaaxo", sr: "шамар", ti: "ጣቕዒት", zh: "耳光", tg: "силлӣ", es: "bofetada", th: "การตบหน้า" },
            { dk: "at rejse sig op", en: "to stand up", bn: "উঠে দাঁড়ানো", hi: "खड़े होना", ur: "کھڑے ہونا", uk: "підводитися", ru: "вставать", fa: "بلند شدن", tr: "ayağa kalkmak", km: "rabûn ser xwe", so: "rabûn ser xwe", ne: "उठ्नु", sw: "kusimama", fr: "se lever", tw: "sɔre gyina hɔ", bs: "ustati", som: "kacyahay", sr: "устати", ti: "ምትንሳእ", zh: "站起来", tg: "бархостан", es: "levantarse", th: "ลุกขึ้นยืน" },
            { dk: "at skynde sig", en: "to hurry", bn: "তাড়াতাড়ি করা", hi: "जल्दी करना", ur: "جلدی کرنا", uk: "поспішати", ru: "спешить", fa: "عجله کردن", tr: "acele etmek", km: "lez kirin", so: "lez kirin", ne: "हतार गर्नु", sw: "kufanya haraka", fr: "se dépêcher", tw: "yɛ ntɛm", bs: "žuriti", som: "degdegid", sr: "журити", ti: "ምቅልጣፍ", zh: "赶快", tg: "шитоб кардан", es: "darse prisa", th: "รีบเร่ง" }
        ];

        const languages = [
            { code: 'en', name: 'Engelsk' },
            { code: 'bn', name: 'Bengali' },
            { code: 'hi', name: 'Hindi' },
            { code: 'ur', name: 'Urdu' },
            { code: 'uk', name: 'Ukrainsk' },
            { code: 'ru', name: 'Russisk' },
            { code: 'fa', name: 'Persisk' },
            { code: 'tr', name: 'Tyrkisk' },
            { code: 'km', name: 'Kurdisk (Kurmanji)' },
            { code: 'so', name: 'Kurdisk (Sorani)' },
            { code: 'ne', name: 'Nepalesisk' },
            { code: 'sw', name: 'Kiswahili' },
            { code: 'fr', name: 'Fransk' },
            { code: 'tw', name: 'Twi' },
            { code: 'bs', name: 'Bosnisk' },
            { code: 'som', name: 'Somali' },
            { code: 'sr', name: 'Serbisk' },
            { code: 'ti', name: 'Tigrinya' },
            { code: 'zh', name: 'Mandarin Kinesisk' },
            { code: 'tg', name: 'Tadjikisk' },
            { code: 'es', name: 'Spansk' },
            { code: 'th', name: 'Thai' }
        ];

        // State
        let currentDeck = [];
        let currentCardIndex = 0;
        let isFlipped = false;
        let isTransitioning = false;
        let selectedLang = 'en';
        let totalInitialCount = 0;

        // Elementer
        const langSelect = document.getElementById('languageSelect');
        const cardInner = document.getElementById('cardInner');
        const danishWordEl = document.getElementById('danishWord');
        const targetWordEl = document.getElementById('targetWord');
        const controls = document.getElementById('controls');
        const remainingCountEl = document.getElementById('remainingCount');
        const progressBar = document.getElementById('progressBar');
        const finishScreen = document.getElementById('finishScreen');
        const gameArea = document.getElementById('gameArea');

        // Init
        function init() {
            // Fyld dropdown
            languages.forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang.code;
                opt.textContent = lang.name;
                langSelect.appendChild(opt);
            });

            langSelect.addEventListener('change', (e) => {
                selectedLang = e.target.value;
                updateDisplay();
            });

            gameArea.addEventListener('click', flipCard);
            document.getElementById('btnRight').addEventListener('click', () => handleChoice(true));
            document.getElementById('btnWrong').addEventListener('click', () => handleChoice(false));

            resetGame();
        }

        function resetGame() {
            currentDeck = [...vocabulary];
            shuffle(currentDeck);
            totalInitialCount = currentDeck.length;
            currentCardIndex = 0;
            isFlipped = false;
            isTransitioning = false;
            finishScreen.classList.add('hidden');
            cardInner.classList.remove('flipped');
            controls.classList.add('opacity-0', 'pointer-events-none');
            updateDisplay();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateDisplay() {
            if (currentDeck.length === 0) {
                finishScreen.classList.remove('hidden');
                return;
            }
            
            const currentItem = currentDeck[currentCardIndex];
            danishWordEl.textContent = currentItem.dk;
            targetWordEl.textContent = currentItem[selectedLang];
            
            remainingCountEl.textContent = currentDeck.length;
            const progress = ((totalInitialCount - currentDeck.length) / totalInitialCount) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function flipCard() {
            if (isTransitioning || isFlipped) return;
            
            isFlipped = true;
            cardInner.classList.add('flipped');
            
            // Vis knapper efter animation
            setTimeout(() => {
                controls.classList.remove('opacity-0', 'pointer-events-none');
            }, 300);
        }

        function handleChoice(correct) {
            if (isTransitioning) return;
            isTransitioning = true;

            // Skjul knapper straks
            controls.classList.add('opacity-0', 'pointer-events-none');

            // 1. Vend tilbage til forsiden
            cardInner.classList.remove('flipped');
            isFlipped = false;

            // 2. Vent 400ms (isTransitioning logik)
            setTimeout(() => {
                if (correct) {
                    // Fjern fra bunken
                    currentDeck.splice(currentCardIndex, 1);
                } else {
                    // Flyt bagerst i bunken
                    const item = currentDeck.splice(currentCardIndex, 1)[0];
                    currentDeck.push(item);
                }

                // Check om vi er færdige
                if (currentDeck.length === 0) {
                    finishScreen.classList.remove('hidden');
                } else {
                    if (currentCardIndex >= currentDeck.length) {
                        currentCardIndex = 0;
                    }
                    updateDisplay();
                }
                
                isTransitioning = false;
            }, 400);
        }

        window.onload = init;
    </script>
</body>
</html>
