<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Læringsapp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 {
            perspective: 1000px;
        }
        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flipped {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        body {
            background-color: #f3f4f6; /* Lysegrå baggrund */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="app" class="w-full max-w-md mt-8">
        <!-- Header & Sprogvalg -->
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold mb-4">Flashcards</h1>
            <label for="langSelect" class="block text-sm font-medium text-gray-700 mb-2">Vælg målsprog:</label>
            <select id="langSelect" class="w-full p-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <!-- Sprog tilføjes dynamisk -->
            </select>
        </div>

        <!-- Status Bar -->
        <div class="mb-4 flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border border-gray-200">
            <span class="text-sm font-medium text-gray-600 uppercase tracking-wider">Status</span>
            <span id="cardCount" class="text-sm font-bold text-blue-600">Kort tilbage: 0</span>
        </div>

        <!-- Card Container -->
        <div id="cardGameContainer" class="relative">
            <div id="cardWrapper" class="perspective-1000 w-full h-80 cursor-pointer">
                <div id="cardInner" class="flip-card-inner relative w-full h-full shadow-xl rounded-2xl border border-gray-200">
                    <!-- Forside (Dansk) -->
                    <div class="flip-card-front absolute inset-0 bg-white flex items-center justify-center p-6 rounded-2xl">
                        <p id="danishWord" class="text-2xl font-bold text-gray-800 text-center"></p>
                    </div>
                    <!-- Bagside (Oversættelse) -->
                    <div class="flip-card-back absolute inset-0 bg-[#f5f5dc] flex items-center justify-center p-6 rounded-2xl border-2 border-beige-300">
                        <p id="translatedWord" class="text-2xl font-bold text-gray-800 text-center"></p>
                    </div>
                </div>
            </div>

            <!-- Kontrol Knapper -->
            <div id="controls" class="mt-8 grid grid-cols-2 gap-4 opacity-0 pointer-events-none transition-opacity duration-300">
                <button id="btnWrong" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform active:scale-95 transition-all">
                    Forkert
                </button>
                <button id="btnRight" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform active:scale-95 transition-all">
                    Rigtigt
                </button>
            </div>
        </div>

        <!-- Færdig Skærm -->
        <div id="finishScreen" class="hidden text-center bg-white p-10 rounded-2xl shadow-xl border border-gray-200">
            <div class="mb-4 text-5xl">🎉</div>
            <h2 class="text-2xl font-bold mb-2">Færdig!</h2>
            <p class="text-gray-600 mb-6">Du har lært alle ordene i denne runde.</p>
            <button id="btnRestart" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-colors">
                Start forfra
            </button>
        </div>
    </div>

            { id: "ur", name: "Urdu" },

            { id: "ru", name: "Russisk" },
            { id: "fa", name: "Persisk" },
            { id: "tr", name: "Tyrkisk" },
            { id: "kmr", name: "Kurdisk Kurmanji" },
            { id: "sor", name: "Kurdisk Sorani" },
            { id: "ne", name: "Nepalesisk" },
            { id: "sw", name: "Kiswahili" },
            { id: "fr", name: "Fransk" },
            { id: "twi", name: "Twi" },
            { id: "bs", name: "Bosnisk" },
            { id: "som", name: "Somali" },
            { id: "sr", name: "Serbisk" },
            { id: "ti", name: "Tigrinya" },
            { id: "zh", name: "Mandarin Kinesisk" }
        ];

        // State
        let deck = [];
        let currentCard = null;
        let selectedLang = "en";
        let isTransitioning = false;
        let isFlipped = false;

        // DOM Elementer
        const langSelect = document.getElementById('langSelect');
        const cardInner = document.getElementById('cardInner');
        const cardWrapper = document.getElementById('cardWrapper');
        const danishWordText = document.getElementById('danishWord');
        const translatedWordText = document.getElementById('translatedWord');
        const cardCount = document.getElementById('cardCount');
        const controls = document.getElementById('controls');
        const cardGameContainer = document.getElementById('cardGameContainer');
        const finishScreen = document.getElementById('finishScreen');
        const btnRight = document.getElementById('btnRight');
        const btnWrong = document.getElementById('btnWrong');
        const btnRestart = document.getElementById('btnRestart');

        // Initialisering
        function init() {
            // Fyld sprogvælger
            languages.forEach(lang => {
                const opt = document.createElement('option');
                opt.value = lang.id;
                opt.textContent = lang.name;
                langSelect.appendChild(opt);
            });

            startNewGame();
        }

        function startNewGame() {
            deck = [...wordData];
            shuffle(deck);
            finishScreen.classList.add('hidden');
            cardGameContainer.classList.remove('hidden');
            showNextCard();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showNextCard() {
            if (deck.length === 0) {
                showFinishScreen();
                return;
            }
            
            currentCard = deck[0];
            danishWordText.textContent = currentCard.da;
            translatedWordText.textContent = currentCard[selectedLang];
            cardCount.textContent = `Kort tilbage: ${deck.length}`;
            
            // Nulstil visuel tilstand
            isFlipped = false;
            cardInner.classList.remove('flipped');
            controls.classList.add('opacity-0', 'pointer-events-none');
            isTransitioning = false;
        }

        function showFinishScreen() {
            cardGameContainer.classList.add('hidden');
            finishScreen.classList.remove('hidden');
        }

        // Event Listeners
        langSelect.addEventListener('change', (e) => {
            selectedLang = e.target.value;
            if (currentCard) {
                translatedWordText.textContent = currentCard[selectedLang];
            }
        });

        cardWrapper.addEventListener('click', () => {
            if (isTransitioning || isFlipped) return;
            
            isFlipped = true;
            cardInner.classList.add('flipped');
            
            // Vis knapper efter animationen
            setTimeout(() => {
                controls.classList.remove('opacity-0', 'pointer-events-none');
            }, 300);
        });

        function handleAnswer(isCorrect) {
            if (isTransitioning) return;
            isTransitioning = true;

            // 1. Skjul knapper
            controls.classList.add('opacity-0', 'pointer-events-none');

            // 2. Vend kortet tilbage til forsiden (Dansk)
            cardInner.classList.remove('flipped');

            // 3. Vent 400ms (isTransitioning logik) før teksten opdateres
            setTimeout(() => {
                if (isCorrect) {
                    deck.shift(); // Fjern fra bunken
                } else {
                    // Flyt bagerst i bunken
                    const moved = deck.shift();
                    deck.push(moved);
                }
                showNextCard();
            }, 400);
        }

        btnRight.addEventListener('click', (e) => {
            e.stopPropagation();
            handleAnswer(true);
        });

        btnWrong.addEventListener('click', (e) => {
            e.stopPropagation();
            handleAnswer(false);
        });

        btnRestart.addEventListener('click', startNewGame);

        // Start app
        init();

    </script>
</body>
</html>
