<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - Sunset Warmth</title>
    <style>
        /* Sunset Warmth Farvetema */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fff9f5; /* Lys sandfarve */
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 600px; /* Gjort lidt bredere for at give plads til 2 kolonner */
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(93, 64, 55, 0.1); 
            text-align: center;
            border: 1px solid #edbb99;
        }

        h1 { color: #5d4037; margin-bottom: 5px; } /* Mørkebrun */
        p { color: #a04000; margin-bottom: 30px; }

        /* NYT: Grid-system til knapper i to kolonner */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* To lige store kolonner */
            gap: 15px; /* Mellemrum mellem knapperne */
            margin-bottom: 20px;
        }

        /* De nye Sunset knapper */
        .menu-btn { 
            display: flex; /* Gør det nemt at centrere tekst */
            align-items: center;
            justify-content: center;
            background: #e67e22; /* Varm orange */
            color: white; 
            padding: 15px 10px; 
            text-decoration: none; 
            border-radius: 15px; 
            font-size: 1rem; /* Lidt mindre skrift for at passe i kolonner */
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #d35400; /* Mørk orange bund */
            min-height: 60px; /* Sikrer at knapperne er lige høje */
        }

        .menu-btn:hover { 
            background: #d35400; 
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #a04000;
        }

        .menu-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a04000;
        }

        /* Mobil-visning: Hvis skærmen er meget lille, går vi tilbage til én kolonne */
        @media (max-width: 400px) {
            .button-grid {
                grid-template-columns: 1fr;
            }
        }

        hr {
            margin: 30px 0;
            border: 0;
            border-top: 2px dashed #edbb99;
        }

        .back-link { 
            display: inline-block; 
            color: #8d6e63; 
            text-decoration: none; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Flashcards</h1>
    <p>Vælg et sæt og start din træning</p>

    <div class="button-grid">

        <a href="mundtlig-test-modul-4.html" class="menu-btn">Mundtlig test modul 4</a>
        <a href="uregelmæssige-adjektiver.html" class="menu-btn">Uregelmæssige adjektiver</a>
        <a href="konjunktioner.html" class="menu-btn">Vigtige konjunktioner</a>
        <a href="fokus-4-kapitel-2.html" class="menu-btn">Fokus 4 - Uddannelse</a>
        <a href="dialog-aftale.html" class="menu-btn">Dialog - aftale</a>
        <a href="hv-ord.html" class="menu-btn">Hv-ord</a>
        <a href="præsentation-spørgsmål-svar.html" class="menu-btn">Præsentation</a>
    </div>
    
    <hr>
    
    <a href="du2-modul.html" class="back-link">← Tilbage til Modul 3-4</a>
</div>

</body>
</html>
