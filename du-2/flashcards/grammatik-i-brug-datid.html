<!DOCTYPE html>
<html lang="da">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprog Flashcards</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 3D Flip Card klasser, som Tailwind ikke understøtter direkte ud af boksen */
    .perspective-1000 {
      perspective: 1000px;
    }
    .preserve-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .rotate-y-180 {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans antialiased">

            <option value="eng">Engelsk (English)</option>
            <option value="ben">Bengali (বাংলা)</option>
            <option value="hin">Hindi (हिन्दी)</option>
            <option value="urd">Urdu (اردو)</option>
            <option value="ukr">Ukrainsk (Українська)</option>
            <option value="rus">Russisk (Русский)</option>
            <option value="per">Persisk (فارسی)</option>
            <option value="tur">Tyrkisk (Türkçe)</option>
            <option value="kur_kmr">Kurdisk Kurmanji (Kurmancî)</option>
            <option value="kur_sd">Kurdisk Sorani (سۆرانی)</option>
            <option value="nep">Nepalesisk (नेपाली)</option>
            <option value="swa">Kiswahili</option>
            <option value="fre">Fransk (Français)</option>
            <option value="twi">Twi</option>
            <option value="bos">Bosnisk (Bosanski)</option>
            <option value="som">Somali (Soomaali)</option>
            <option value="srp">Serbisk (Српски)</option>
            <option value="tir">Tigrinya (ትግርኛ)</option>

            <option value="tgk">Tadjikisk (Тоҷикӣ)</option>
            <option value="spa">Spansk (Español)</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Hovedindhold -->
    <main class="flex-grow flex flex-col items-center justify-center py-4">
      
      <!-- Spilleskærm -->
      <div id="game-screen" class="w-full max-w-md flex flex-col items-center">
        <!-- Statuslinje -->
        <div class="w-full flex justify-between items-center mb-4 px-2">
          <span class="text-sm font-medium text-gray-600">
            Kort tilbage: <span id="cards-left" class="font-bold text-gray-900">25</span>
          </span>
          <span id="progress-text" class="text-xs text-gray-500">
            0% gennemført
          </span>
        </div>
        
        <!-- Status ProgressBar -->
        <div class="w-full bg-gray-200 rounded-full h-1.5 mb-6 overflow-hidden">
          <div id="progress-bar" class="bg-emerald-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <!-- 3D Card Container -->
        <div id="card-container" class="w-full aspect-[4/3] perspective-1000 cursor-pointer group mb-6">
          <div id="card-inner" class="relative w-full h-full transition-transform duration-500 preserve-3d rounded-2xl shadow-lg border border-gray-200">
            
            <!-- FORSIDE (Dansk) - Hvid med sort skrift -->
            <div class="absolute inset-0 w-full h-full rounded-2xl bg-white text-gray-900 flex flex-col items-center justify-center p-6 backface-hidden">
              <div class="absolute top-4 left-4 text-xs font-semibold tracking-wider text-gray-400 uppercase">Dansk</div>
              <div id="word-danish" class="text-2xl sm:text-3xl font-bold text-center px-4 leading-tight">
                Mørk
              </div>
              <div class="absolute bottom-4 text-xs text-gray-400 animate-pulse">
                Klik på kortet for at vende det
              </div>
            </div>

            <!-- BAGSIDE (Målsprog) - Beige med sort skrift -->
            <div class="absolute inset-0 w-full h-full rounded-2xl bg-[#F5F2EB] text-gray-900 flex flex-col items-center justify-center p-6 backface-hidden rotate-y-180">
              <div id="back-lang-label" class="absolute top-4 left-4 text-xs font-semibold tracking-wider text-gray-500 uppercase">Oversættelse</div>
              <div id="word-translation" class="text-2xl sm:text-3xl font-bold text-center px-4 leading-tight text-amber-950">
                Dark
              </div>
              <div class="absolute bottom-4 text-xs text-gray-400">
                Vurder dit svar nedenfor
              </div>
            </div>

          </div>
        </div>

        <!-- Knapper (Kun synlige når kortet er vendt) -->
        <div id="action-buttons" class="w-full grid grid-cols-2 gap-4 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2">
          <button id="btn-incorrect" class="flex items-center justify-center gap-2 bg-rose-50 text-rose-700 hover:bg-rose-100 border-2 border-rose-200 font-bold py-3 px-4 rounded-xl shadow-sm transition-all transform active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            Forkert
          </button>
          <button id="btn-correct" class="flex items-center justify-center gap-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border-2 border-emerald-200 font-bold py-3 px-4 rounded-xl shadow-sm transition-all transform active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Rigtigt
          </button>
        </div>

      </div>

      <!-- Færdigskærm (Skjult som udgangspunkt) -->
      <div id="finished-screen" class="hidden w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-200 text-center flex flex-col items-center py-10">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mb-6">
          <span class="text-4xl">🎉</span>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Flot klaret!</h2>
        <p class="text-gray-600 mb-6" id="finished-message">

        </p>
        <button id="btn-restart" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-md transition-all transform active:scale-95">
          Start forfra
        </button>
      </div>

    </main>

    <footer class="mt-8 text-center text-xs text-gray-400">
      <p>Udviklet til nem sprogtræning uden login • Sprog-Flashcards &copy; 2026</p>

      eng: "Engelsk", ben: "Bengali", hin: "Hindi", urd: "Urdu", ukr: "Ukrainsk",
      rus: "Russisk", per: "Persisk", tur: "Tyrkisk", kur_kmr: "Kurdisk Kurmanji",

      twi: "Twi", bos: "Bosnisk", som: "Somali", srp: "Serbisk", tir: "Tigrinya",
      chi: "Mandarin Kinesisk", tgk: "Tadjikisk", spa: "Spansk"
    };

    // Funktion til at blande bunken (Fisher-Yates shuffle)
    function shuffleDeck(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // Start et nyt spil / Nulstil dækket
    function startNewSession() {
      // Opret en kopi af alle ord i ordbogen
      currentDeck = dictionary.map((item, index) => ({
        id: index,
        da: item.da,
        translation: item.translations[currentLanguage]
      }));
      
      // Bland kortene tilfældigt
      shuffleDeck(currentDeck);
      
      currentCardIndex = 0;
      isFlipped = false;
      isTransitioning = false;
      
      // Reset UI-klasser for kortet (vis forsiden)
      cardInner.classList.remove('rotate-y-180');
      hideButtons();
      
      // Vis spilleskærm, skjul færdigskærm
      gameScreen.classList.remove('hidden');
      finishedScreen.classList.add('hidden');
      
      updateUI();
    }

    // Opdater data og grafik på skærmen
    function updateUI() {
      if (currentDeck.length === 0) {
        showFinishedScreen();
        return;
      }

      // Sørg for at index ikke løber løbsk
      if (currentCardIndex >= currentDeck.length) {
        currentCardIndex = 0;
      }

      const activeCard = currentDeck[currentCardIndex];
      
      // Opdater ord
      wordDanish.textContent = activeCard.da;
      wordTranslation.textContent = activeCard.translation;
      
      // Opdater labels
      const langName = languageNames[currentLanguage];
      langBadge.textContent = `Dansk ➔ ${langName}`;
      backLangLabel.textContent = `Oversættelse (${langName})`;
      
      // Status informationer
      cardsLeftEl.textContent = currentDeck.length;
      
      // Fremskridtsberegning ud fra hvor mange kort der er fjernet af de 25 oprindelige
      const learnedCount = dictionary.length - currentDeck.length;
      const progressPercent = Math.round((learnedCount / dictionary.length) * 100);
      progressBar.style.width = `${progressPercent}%`;
      progressText.textContent = `${progressPercent}% gennemført`;
    }

    // Viser knapperne med en flydende animation
    function showButtons() {
      actionButtons.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
      actionButtons.classList.add('opacity-100', 'translate-y-0');
      actionButtons.style.pointerEvents = 'auto';
    }

    // Skjuler knapperne med animation
    function hideButtons() {
      actionButtons.classList.remove('opacity-100', 'translate-y-0');
      actionButtons.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
      actionButtons.style.pointerEvents = 'none';
    }

    // Vend kortet (Toggle flip)
    function flipCard() {
      if (isTransitioning) return; // Bloker interaktion under transition
      
      isFlipped = !isFlipped;
      
      if (isFlipped) {
        cardInner.classList.add('rotate-y-180');
        // Vis svarknapperne med det samme efter kortet er vendt
        setTimeout(() => {
          if (isFlipped) showButtons();
        }, 150);
      } else {
        cardInner.classList.remove('rotate-y-180');
        hideButtons();
      }
    }

    // Håndter gæt og transition (Timing-logik)
    function handleAnswer(isCorrect) {
      if (isTransitioning) return;
      isTransitioning = true;
      
      // Gem svarknapperne med det samme
      hideButtons();
      
      // 1. Vend kortet tilbage til forsiden (Dansk)
      cardInner.classList.remove('rotate-y-180');
      isFlipped = false;
      
      // Gem data midlertidigt så vi kan udføre logikken
      const activeCard = currentDeck[currentCardIndex];
      
      // 2. Brug en setTimeout på 400ms for at vente på, at kortet har forsiden mod brugeren
      setTimeout(() => {
        if (isCorrect) {
          // Fjern kortet fra bunken
          currentDeck.splice(currentCardIndex, 1);
          // Da vi fjerner elementet, skal vi ikke øge indexet, medmindre vi var på det sidste kort
          if (currentCardIndex >= currentDeck.length) {
            currentCardIndex = 0;
          }
        } else {
          // Bliv i bunken, gå til næste kort (roter bunken for variation)
          if (currentDeck.length > 1) {
            currentCardIndex = (currentCardIndex + 1) % currentDeck.length;
          }
        }
        
        // Opdater teksten, nu hvor forsiden er synlig
        updateUI();
        
        // Genaktiver kortinteraktion efter opdateringen er færdig
        isTransitioning = false;
      }, 400);
    }

    // Vis den afsluttende "Færdig"-skærm
    function showFinishedScreen() {
      gameScreen.classList.add('hidden');
      finishedScreen.classList.remove('hidden');
      finishedMessage.textContent = `Du har lært alle ${dictionary.length} ord og vendinger på ${languageNames[currentLanguage]}!`;
    }

    // --- EVENT LISTENERS ---

    // Klik på selve kortet for at vende det
    cardContainer.addEventListener('click', flipCard);

    // Klik på Rigtigt
    btnCorrect.addEventListener('click', (e) => {
      e.stopPropagation(); // Undgå at klikket trigger "flipCard" på forældre-div'en
      handleAnswer(true);
    });

    // Klik på Forkert
    btnIncorrect.addEventListener('click', (e) => {
      e.stopPropagation(); // Undgå at klikket trigger "flipCard" på forældre-div'en
      handleAnswer(false);
    });

    // Sprogændring i dropdown
    languageSelect.addEventListener('change', (e) => {
      currentLanguage = e.target.value;
      startNewSession();
    });

    // Knappen til at starte forfra
    btnRestart.addEventListener('click', startNewSession);

    // Support for piletaster og tastaturgenveje
    document.addEventListener('keydown', (e) => {
      // Hvis vi er på færdigskærmen, kan vi trykke Enter for at genstarte
      if (currentDeck.length === 0 && e.key === 'Enter') {
        startNewSession();
        return;
      }

      if (currentDeck.length > 0 && !isTransitioning) {
        if (e.key === ' ' || e.key === 'Enter') {
          // Space eller Enter vender kortet
          e.preventDefault();
          flipCard();
        } else if (isFlipped) {
          // Pile-taster når kortet er vendt
          if (e.key === 'ArrowRight' || e.key === 'r') {
            // Rigtigt (højre pil eller 'r')
            handleAnswer(true);
          } else if (e.key === 'ArrowLeft' || e.key === 'f') {
            // Forkert (venstre pil eller 'f')
            handleAnswer(false);
          }
        }
      }
    });

    // Initialiser spillet første gang siden loades
    startNewSession();
  </script>
</body>
</html>
