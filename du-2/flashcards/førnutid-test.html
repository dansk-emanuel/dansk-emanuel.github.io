<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dansk Grammatik: Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn:disabled { cursor: not-allowed; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-6 px-4 font-sans">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="bg-indigo-700 rounded-t-2xl p-8 text-white shadow-lg text-center">
            <h1 class="text-3xl font-bold italic tracking-tight">Verbetest: DU2</h1>
            <p class="text-indigo-100 mt-2">Datid eller førnutid? Vælg det rigtige svar.</p>
        </div>

        <!-- Quiz Container -->
        <div id="quiz-container" class="bg-white border-x p-6 space-y-6 shadow-sm">
            <!-- Spørgsmål indsættes her -->
        </div>

        <!-- Result/Status Footer -->
        <div class="bg-gray-900 rounded-b-2xl p-6 text-white sticky bottom-4 flex justify-between items-center shadow-2xl mx-2">
            <div>
                <span class="text-gray-400 text-xs uppercase tracking-widest">Dine point</span>
                <div class="text-2xl font-bold text-indigo-400"><span id="score">0</span> / 20</div>
            </div>
            <button onclick="window.location.reload()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-full font-bold transition-all">
                Genstart test
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "Jeg ________ en god film i biografen i går aftes.", options: ["så", "har set"], correct: 0 },
            { q: "Jeg ________ her i Danmark i tre år nu.", options: ["boede", "har boet"], correct: 1 },
            { q: "Han ________ sin cykel i morges, før han tog på arbejde.", options: ["reparerede", "har repareret"], correct: 0 },
            { q: "Vi ________ morgenmad, så vi er mætte nu.", options: ["spiste allerede", "har allerede spist"], correct: 1 },
            { q: "I 2010 ________ de til Odense.", options: ["flyttede", "er flyttet"], correct: 0 },
            { q: "Jeg ________ sushi før. Er det lækkert?", options: ["smagte aldrig", "har aldrig smagt"], correct: 1 },
            { q: "Min datter ________ sin eksamen i sidste uge.", options: ["bestod", "har bestået"], correct: 0 },
            { q: "________ din mobil? Jeg kan ikke finde den.", options: ["Fandt du", "Har du fundet"], correct: 1 },
            { q: "Da jeg var barn, ________ jeg meget fodbold.", options: ["spillede", "har spillet"], correct: 0 },
            { q: "Vi ________ mange nye ord i denne uge.", options: ["lærte", "har lært"], correct: 1 },
            { q: "I går ________ det hele dagen.", options: ["regnede", "har regnet"], correct: 0 },
            { q: "Bussen ________, så vi må løbe!", options: ["kørte lige", "er lige kørt"], correct: 1 },
            { q: "Han ________ tysk i skolen for many år siden.", options: ["læste", "har læst"], correct: 0 },
            { q: "Jeg ________ min nøgle. Kan du hjælpe mig?", options: ["tabte", "har tabt"], correct: 1 },
            { q: "Sidste sommer ________ vi til Italien.", options: ["rejste", "er rejst"], correct: 0 },
            { q: "Hun ________ sin kaffe endnu.", options: ["drak ikke", "har ikke drukket"], correct: 1 },
            { q: "I morges ________ jeg klokken 7.", options: ["vågnede", "er vågnet"], correct: 0 },
            { q: "De ________ hinanden i over ti år.", options: ["kendte", "har kendt"], correct: 1 },
            { q: "For to timer siden ________ jeg en mail til ham.", options: ["sendte", "har sendt"], correct: 0 },
            { q: "Hvor ________ hen? Jeg kan ikke se dig.", options: ["gik du", "er du gået"], correct: 1 }
        ];

        let score = 0;
        const container = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = "pb-6 border-b border-gray-100 last:border-0 animate-fadeIn";
            
            const questionTitle = document.createElement('h3');
            questionTitle.className = "text-lg text-gray-800 mb-4 font-medium";
            questionTitle.innerHTML = `<span class="text-indigo-400 font-bold mr-2">${index + 1}.</span> ${item.q}`;
            questionDiv.appendChild(questionTitle);

            const optionsGrid = document.createElement('div');
            optionsGrid.className = "grid grid-cols-1 sm:grid-cols-2 gap-3";

            item.options.forEach((opt, optIndex) => {
                const btn = document.createElement('button');
                btn.className = "option-btn text-left px-5 py-3 border border-gray-300 rounded-xl hover:bg-indigo-50 transition-all text-gray-700";
                btn.innerText = opt;
                btn.onclick = () => handleChoice(index, optIndex, btn, questionDiv);
                optionsGrid.appendChild(btn);
            });

            questionDiv.appendChild(optionsGrid);
            container.appendChild(questionDiv);
        });

        function handleChoice(qIndex, choiceIndex, btn, parent) {
            const isCorrect = choiceIndex === quizData[qIndex].correct;
            const buttons = parent.querySelectorAll('button');

            buttons.forEach(b => {
                b.disabled = true;
                b.classList.replace('hover:bg-indigo-50', 'bg-gray-50');
                b.classList.add('opacity-50');
            });

            if (isCorrect) {
                score++;
                btn.className = "text-left px-5 py-3 bg-green-500 border-green-500 text-white rounded-xl font-bold shadow-md opacity-100";
                btn.innerText = "✓ " + btn.innerText;
            } else {
                btn.className = "text-left px-5 py-3 bg-red-500 border-red-500 text-white rounded-xl font-bold shadow-md opacity-100";
                btn.innerText = "✗ " + btn.innerText;
                
                // Find og markér det rigtige svar diskret
                buttons[quizData[qIndex].correct].classList.remove('opacity-50');
                buttons[quizData[qIndex].correct].classList.add('border-green-500', 'text-green-600', 'border-2');
            }

            document.getElementById('score').innerText = score;
        }
    </script>
</body>
</html>
